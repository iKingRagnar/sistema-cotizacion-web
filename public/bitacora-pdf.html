<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro de bitácora</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, 'Georgia', serif;
      margin: 0;
      padding: 0;
      color: #0f172a;
      font-size: 11pt;
      line-height: 1.45;
      background: linear-gradient(165deg, #faf5ff 0%, #f3e8ff 45%, #fafafa 100%);
    }
    .no-print { position: fixed; top: 0; left: 0; right: 0; z-index: 9999; padding: 0.75rem 1.5rem; background: linear-gradient(90deg, #4c1d95 0%, #6d28d9 45%, #7c3aed 100%); color: #f5f3ff; display: flex; align-items: center; gap: 1rem; box-shadow: 0 4px 20px rgba(124, 58, 237, 0.35); }
    .no-print button { padding: 0.5rem 1rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
    .no-print #btn-print { background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%); color: #fff; box-shadow: 0 2px 12px rgba(124, 58, 237, 0.45); }
    .no-print #btn-close { background: #475569; color: #fff; }
    .doc { max-width: 210mm; margin: 0 auto; padding: 2rem 2.5rem; padding-top: 4rem; }
    .no-print + .doc { padding-top: 2rem; }
    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      .no-print { display: none !important; }
      .doc { padding-top: 0.5rem; background: #fff; }
      body { background: #fff; }
    }
    .letterhead {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 1rem 1.15rem 1.15rem;
      margin: -0.25rem -0.5rem 1.35rem;
      border-radius: 12px;
      background: linear-gradient(125deg, #5b21b6 0%, #6d28d9 38%, #7c3aed 72%, #8b5cf6 100%);
      color: #fff;
      box-shadow: 0 8px 28px rgba(91, 33, 182, 0.38);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .letterhead-logo { height: 48px; width: auto; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.2)); }
    .letterhead-company .name { font-size: 1.12rem; font-weight: 800; color: #fff; margin: 0; text-shadow: 0 1px 2px rgba(0,0,0,0.15); }
    .letterhead-company .tagline { font-size: 0.76rem; color: rgba(255,255,255,0.9); margin: 0.3rem 0 0; }
    .doc-title {
      text-align: center;
      font-size: 1.42rem;
      font-weight: 800;
      margin: 0 0 1.15rem;
      letter-spacing: 0.08em;
      background: linear-gradient(90deg, #6d28d9, #7c3aed, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
    }
    @supports not (background-clip: text) {
      .doc-title { color: #7c3aed; -webkit-text-fill-color: #7c3aed; }
    }
    .doc-meta { display: flex; flex-wrap: wrap; gap: 1rem 1.5rem; margin-bottom: 1.15rem; font-size: 0.88rem; }
    .doc-meta span { display: block; padding: 0.4rem 0.7rem; background: linear-gradient(180deg, #faf5ff 0%, #f3e8ff 100%); border-radius: 8px; border: 1px solid #d8b4fe; }
    .doc-meta strong { color: #5b21b6; margin-right: 0.3rem; font-weight: 700; }
    .doc-table { width: 100%; border-collapse: separate; border-spacing: 0; margin: 0.85rem 0; font-size: 0.9rem; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 14px rgba(91, 33, 182, 0.12); }
    .doc-table th, .doc-table td { padding: 0.5rem 0.65rem; text-align: left; border: 1px solid #e9d5ff; }
    .doc-table th {
      background: linear-gradient(180deg, #7c3aed 0%, #6d28d9 100%);
      color: #fff;
      font-weight: 700;
      width: 28%;
      text-shadow: 0 1px 1px rgba(0,0,0,0.12);
    }
    .doc-table td { background: #fff; }
    .doc-table tr:nth-child(even) td { background: #faf5ff; }
    .doc-section { margin-top: 1.05rem; }
    .doc-section-title { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.14em; color: #6d28d9; margin-bottom: 0.4rem; font-weight: 700; }
    .doc-section-content {
      background: linear-gradient(180deg, #f5f3ff 0%, #ede9fe 100%);
      padding: 0.95rem 1.05rem;
      border: 1px solid #c4b5fd;
      border-radius: 10px;
      border-left: 4px solid #7c3aed;
      white-space: pre-wrap;
      box-shadow: 0 2px 10px rgba(91, 33, 182, 0.08);
    }
    .doc-firma { margin-top: 1.5rem; }
    .doc-firma-line { border-bottom: 2px solid #7c3aed; height: 2em; width: 220px; margin-bottom: 0.25rem; }
    .doc-firma-label { font-size: 0.72rem; color: #64748b; font-weight: 600; }
    .loading, .error { padding: 2rem; text-align: center; }
    .error { background: linear-gradient(180deg, #fef2f2 0%, #fee2e2 100%); color: #b91c1c; border: 1px solid #fecaca; border-radius: 10px; }
  </style>
</head>
<body>
  <div class="no-print">
    <span id="msg">Cargando registro…</span>
    <button type="button" id="btn-print"><strong>Imprimir / Guardar como PDF</strong></button>
    <button type="button" id="btn-close">Cerrar</button>
  </div>
  <div id="doc-body"></div>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const API = window.location.pathname.replace(/\/[^/]*$/, '') + '/api';
      if (!id) {
        document.getElementById('doc-body').innerHTML = '<div class="doc"><div class="error">Falta el ID del registro (ej. ?id=1).</div></div>';
        document.getElementById('msg').textContent = '';
        return;
      }
      function esc(s) { if (s == null) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
      function fmtDate(s) { if (!s) return '—'; return String(s).slice(0, 10); }
      function render(bit) {
        const basePath = window.location.pathname.replace(/\/[^/]*$/, '') || '';
        const logoUrl = basePath ? (window.location.origin + basePath + '/favicon.svg') : (window.location.origin + '/favicon.svg');
        const html = `
          <div class="doc">
            <header class="letterhead">
              <img src="${esc(logoUrl)}" alt="" class="letterhead-logo" aria-hidden="true">
              <div class="letterhead-company">
                <p class="name">Sistema de Cotización y Gestión</p>
                <p class="tagline">Bitácora de horas · Registro de actividades</p>
              </div>
            </header>
            <h2 class="doc-title">REGISTRO DE BITÁCORA</h2>
            <div class="doc-meta">
              <span><strong>Fecha:</strong> ${fmtDate(bit.fecha)}</span>
              <span><strong>Incidente:</strong> ${esc(bit.incidente_folio) || '—'}</span>
              <span><strong>Cotización:</strong> ${esc(bit.cotizacion_folio) || '—'}</span>
            </div>
            <table class="doc-table">
              <tr><th>Técnico</th><td>${esc(bit.tecnico)}</td></tr>
              <tr><th>Tiempo (horas)</th><td>${bit.tiempo_horas != null ? Number(bit.tiempo_horas) : '—'}</td></tr>
              <tr><th>Materiales utilizados</th><td>${esc(bit.materiales_usados) || '—'}</td></tr>
            </table>
            <div class="doc-section">
              <div class="doc-section-title">Actividades realizadas</div>
              <div class="doc-section-content">${esc(bit.actividades || '—').replace(/\n/g, '<br>')}</div>
            </div>
            <p class="doc-firma-label" style="margin-top:1.25rem;">Documento de respaldo para facturación y/o entrega al cliente. Fecha de impresión: ${fmtDate(new Date().toISOString())}</p>
            <div class="doc-firma-line" style="margin-top:1rem;"></div>
            <div class="doc-firma-label">Firma del técnico / Responsable</div>
          </div>
        `;
        document.getElementById('doc-body').innerHTML = html;
        document.getElementById('msg').textContent = 'Listo. Use «Imprimir» y elija «Guardar como PDF» para descargar.';
      }
      function runPrint() { window.print(); }
      document.getElementById('btn-print').addEventListener('click', runPrint);
      document.getElementById('btn-close').addEventListener('click', function() { window.close(); });
      async function load() {
        try {
          const res = await fetch(API + '/bitacoras/' + id);
          if (!res.ok) throw new Error('Registro no encontrado');
          const bit = await res.json();
          render(bit);
          setTimeout(runPrint, 350);
        } catch (e) {
          document.getElementById('doc-body').innerHTML = '<div class="doc"><div class="error">' + esc(e.message || 'No se pudo cargar el registro.') + '</div></div>';
          document.getElementById('msg').textContent = 'Error al cargar.';
        }
      }
      load();
    })();
  </script>
</body>
</html>
