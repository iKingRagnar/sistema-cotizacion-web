<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cotización</title>
  <style>
    * { box-sizing: border-box; }
    :root { --y: #FFD200; --k: #0a0a0a; --ink: #0f172a; --muted: #475569; --border: #cbd5e1; }
    html { cursor: default; }
    @page { size: letter portrait; margin: 0; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background: #f1f5f9;
      font-size: 10pt;
      line-height: 1.32;
      cursor: default;
    }
    .no-print {
      position: sticky;
      top: 0;
      z-index: 1000;
      padding: 10px 14px;
      background: linear-gradient(90deg, #0a0a0a 0%, #1f2937 60%, #FFD200 100%);
      color: #f8fafc;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 18px rgba(15, 23, 42, 0.35);
    }
    .no-print button {
      border: none;
      border-radius: 8px;
      padding: 7px 11px;
      font-weight: 700;
      cursor: pointer;
    }
    #btn-print { background: var(--y); color: var(--k); }
    #btn-close { background: #475569; color: #fff; }
    #btn-audience { background: #0a0a0a; color: var(--y); border: 1px solid var(--y); }
    .doc {
      width: 100%;
      max-width: 216mm;
      margin: 0 auto;
      padding: 3mm 8mm 4mm;
      background: #fff;
      border: none;
      border-radius: 0;
      box-shadow: none;
      position: relative;
    }
    .head {
      border-radius: 12px;
      padding: 4px 10px 6px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      background: #fff;
      color: #0f172a;
      border-bottom: 3px solid var(--k);
      border-radius: 12px 12px 0 0;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand img { height: 48px; width: auto; border-radius: 6px; background: transparent; padding: 0; }
    .brand h1 { margin: 0; font-size: 14px; color: #0f172a; }
    .brand p { margin: 2px 0 0 0; font-size: 10px; color: #475569; }
    .meta-mini { font-size: 10px; text-align: right; }
    .entrega-box { background: #ecfdf5; border-color: #10b981 !important; color: #065f46; }
    .entrega-box.entrega-disponible { background: #ecfdf5; border-color: #10b981 !important; color: #065f46; }
    .entrega-box.entrega-embarque { background: #eff6ff; border-color: #3b82f6 !important; color: #1e3a8a; }
    .entrega-box.entrega-revision { background: #fef3c7; border-color: #f59e0b !important; color: #78350f; }
    .entrega-box.entrega-revision-sin-fecha,
    .entrega-box.entrega-sin-ubicacion,
    .entrega-box.entrega-desconocido { background: #fef2f2; border-color: #dc2626 !important; color: #7f1d1d; }
    .entrega-box i { flex-shrink: 0; }
    .banner-total {
      background: var(--k);
      color: #fff;
      text-align: center;
      padding: 6px 12px;
      font-weight: 900;
      letter-spacing: .12em;
      font-size: 14px;
      margin: 5px 0 4px;
      border-radius: 6px;
      border-bottom: 3px solid var(--y);
    }
    .title {
      margin: 4px auto 6px;
      text-align: center;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: .14em;
      color: var(--k);
      padding-bottom: 6px;
      border-bottom: 2px solid var(--y);
      max-width: 92%;
    }
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 5px;
    }
    .chip { border: 1px solid var(--border); border-radius: 10px; padding: 4px 7px; background: #fafafa; font-size: 10px; }
    .chip strong { color: var(--k); }
    .cols { display: grid; grid-template-columns: 1.2fr 1fr; gap: 6px; margin-bottom: 5px; }
    .block { border: 1px solid var(--border); border-radius: 8px; padding: 6px 8px; background: #fff; box-shadow: 0 2px 6px rgba(15,23,42,0.05); }
    .block h3 { margin: 0 0 4px; font-size: 10px; color: var(--k); letter-spacing: .1em; text-transform: uppercase; background: var(--y); display: inline-block; padding: 2px 9px; border-radius: 4px; font-weight: 900; }
    .block p { margin: 2px 0; font-size: 10.5px; color: #1e293b; }
    .img-maquina-card { display: flex; align-items: center; justify-content: center; min-height: 140px; background: #fafafa; border: 2px dashed var(--border); border-radius: 8px; padding: 4px; }
    .img-maquina-card img { max-width: 100%; max-height: 140px; object-fit: contain; }
    .img-placeholder { color: #94a3b8; font-size: 11px; font-style: italic; text-align: center; }
    .totals { background: linear-gradient(180deg,#fffbe6 0%,#fff8d6 100%); border: 1px solid var(--y); margin-top: 5px; box-shadow: 0 2px 6px rgba(255,210,0,0.15); padding: 6px 10px; }
    .totals p { display: flex; justify-content: space-between; font-weight: 700; margin: 2px 0; font-size: 11px; }
    .totals p:last-child { color: var(--k); font-size: 13px; font-weight: 900; border-top: 2px solid var(--y); padding-top: 3px; margin-top: 3px; }
    table { width: 100%; border-collapse: collapse; margin: 5px 0; font-size: 10px; box-shadow: 0 2px 6px rgba(15,23,42,0.05); border-radius: 6px; overflow: hidden; }
    th, td { border: 1px solid var(--border); padding: 5px 6px; }
    th { background: var(--y); color: var(--k); text-transform: uppercase; letter-spacing: .06em; font-size: 9px; font-weight: 900; border-color: #c8a000; }
    tbody tr:nth-child(even) td { background: #fafafa; }
    tbody tr:hover td { background: #fffbe6; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .notes {
      margin-top: 6px;
      border: 1px solid var(--y);
      background: #fffbe6;
      border-radius: 8px;
      padding: 7px 8px;
      font-size: 9.5px;
      color: #475569;
    }
    /* Bandas con header amarillo + cuerpo blanco */
    .y-section { margin-top: 5px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .y-head { background: var(--y); color: var(--k); font-weight: 900; font-size: 11px; letter-spacing: .14em; padding: 4px 11px; text-transform: uppercase; }
    .y-body { padding: 5px 10px; background: #fff; font-size: 10px; }
    .ficha-frame { width: 100%; height: 180px; border: 1px solid var(--border); border-radius: 6px; }
    .ficha-img { width: 100%; height: 180px; display: block; margin: 0; object-fit: contain; background: #fff; border-radius: 4px; }
    .ficha-empty { color: #94a3b8; font-style: italic; font-size: 10px; text-align: center; padding: 14px; }
    .proposal-grid { margin-top: 5px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .proposal-card { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: #fff; }
    .proposal-card h4 { margin: 0; background: var(--y); color: var(--k); font-size: 10px; text-transform: uppercase; letter-spacing: .08em; padding: 4px 9px; }
    .proposal-card p { margin: 0; padding: 5px 10px; font-size: 9.8px; color: #1e293b; line-height: 1.3; }
    .atendido-body { padding: 5px 10px; background: #fff; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
    .atendido-nombre { font-weight: 800; font-size: 11.5px; color: var(--k); }
    .atendido-puesto { color: #475569; font-weight: 700; font-size: 10px; }
    .atendido-contact { font-size: 9.5px; color: #475569; display: flex; gap: 10px; }
    .bancarios-empresa { padding: 5px 11px; background: #fffbe6; border-bottom: 1px solid var(--y); font-size: 10.5px; color: var(--k); }
    .bancarios-rfc { font-family: monospace; font-weight: 700; color: var(--k); background: var(--y); padding: 2px 7px; border-radius: 4px; }
    .bancarios-table { width: 100%; border-collapse: collapse; margin: 0; font-size: 9.5px; }
    .bancarios-table th { background: var(--k); color: var(--y); padding: 6px; font-size: 9px; letter-spacing: .06em; border: 1px solid var(--k); }
    .bancarios-table td { padding: 5px 6px; border: 1px solid var(--border); text-align: center; font-family: monospace; font-size: 9.5px; color: var(--ink); }
    .bancarios-table tbody tr:nth-child(even) td { background: #fafafa; }
    .bancarios-politica { padding: 7px 11px; font-size: 8.5px; color: #475569; background: #fff; line-height: 1.35; border-top: 2px solid var(--y); }
    .doc-foot-banda { background: var(--y); color: var(--k); text-align: center; padding: 5px; font-weight: 900; letter-spacing: .14em; margin-top: 5px; border-radius: 0 0 8px 8px; font-size: 11px; }
    .doc-foot {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--border);
      font-size: 8px;
      color: #94a3b8;
      text-align: center;
      letter-spacing: .02em;
    }
    .doc.compact { font-size: 9.3pt; line-height: 1.22; }
    .doc.compact .title { margin: 4px 0; font-size: 18px; }
    .doc.compact th, .doc.compact td { padding: 4px 5px; }
    .doc.compact .meta-grid, .doc.compact .cols { gap: 6px; margin-bottom: 6px; }
    .doc.compact .block, .doc.compact .y-body { padding: 7px 9px; }
    .doc.compact .banner-total { padding: 7px 12px; font-size: 13px; margin: 7px 0 6px; }
    .doc.compact .img-maquina-card { min-height: 150px; }
    .doc.compact .img-maquina-card img { max-height: 150px; }
    .doc.compact .ficha-frame, .doc.compact .ficha-img { width: 100%; height: 140px; max-height: 140px; }
    .doc.ultra { font-size: 8.6pt; line-height: 1.16; }
    .doc.ultra .notes { font-size: 8.5px; }
    .doc.ultra .title { font-size: 15px; margin: 3px 0; }
    .doc.ultra th, .doc.ultra td { padding: 3px 4px; }
    .doc.ultra .block, .doc.ultra .y-body { padding: 5px 7px; }
    .doc.ultra .banner-total { padding: 5px 10px; font-size: 11px; margin: 5px 0 4px; }
    .doc.ultra .img-maquina-card { min-height: 110px; }
    .doc.ultra .img-maquina-card img { max-height: 110px; }
    .doc.ultra .ficha-frame, .doc.ultra .ficha-img { width: 100%; height: 100px; max-height: 100px; }
    .doc.ultra .cols, .doc.ultra .meta-grid, .doc.ultra .proposal-grid { gap: 5px; margin-bottom: 5px; }
    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      html, body { background: #fff; margin: 0; padding: 0; }
      .no-print { display: none !important; }
      /* Print MATCHES preview: misma .doc, mismo padding. LETTER 216x279mm */
      .doc { margin: 0 auto; border: none; border-radius: 0; box-shadow: none; max-width: 216mm; width: 216mm; padding: 6mm 8mm; }
      .doc, .doc * { page-break-inside: avoid; }
    }
    .error { margin: 1rem auto; max-width: 700px; padding: 1rem; border-radius: 10px; border: 1px solid #fecaca; background: #fef2f2; color: #991b1b; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <div class="no-print">
    <span id="msg">Cargando cotización…</span>
    <button type="button" id="btn-audience">Modo: Cliente</button>
    <button type="button" id="btn-pdf">Descargar PDF</button>
    <button type="button" id="btn-print">Imprimir</button>
    <button type="button" id="btn-close">Cerrar</button>
  </div>
  <div id="doc-body"></div>
  <script>
    (function () {
      const AUTH_TOKEN_KEY = 'cotizacion-auth-token';
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const shouldAutoPrint = params.get('autoprint') !== '0';
      let audience = (params.get('audience') || 'cliente').toLowerCase();
      if (audience !== 'interno') audience = 'cliente';
      const API = window.location.pathname.replace(/\/[^/]*$/, '') + '/api';
      if (!id) {
        document.getElementById('doc-body').innerHTML = '<div class="error">Falta el ID de la cotización (ej. ?id=1).</div>';
        document.getElementById('msg').textContent = '';
        return;
      }
      function esc(s) { if (s == null) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
      function escAttr(s) { return esc(s).replace(/"/g, '&quot;'); }
      function fmtNum(n) { return Number(n || 0).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
      function fmtDate(s) { return s ? String(s).slice(0, 10) : '—'; }
      function validHasta(fecha) { const d = new Date(fecha || Date.now()); d.setDate(d.getDate() + 30); return d.toISOString().slice(0, 10); }
      function authHeaders() {
        try {
          const t = localStorage.getItem(AUTH_TOKEN_KEY);
          return t ? { Authorization: 'Bearer ' + t } : {};
        } catch (_) { return {}; }
      }
      async function getJson(url) {
        const r = await fetch(url, { headers: authHeaders() });
        if (!r.ok) throw new Error('No se pudo cargar el documento.');
        return r.json();
      }
      function fitSinglePage() {
        const doc = document.querySelector('.doc');
        if (!doc) return;
        // LETTER alto útil = 279mm - 2*6mm padding = 267mm en CSS px (1mm=3.7795)
        const pageMax = Math.round(267 * 3.7795);
        doc.classList.remove('compact', 'ultra');
        doc.style.transform = '';
        doc.style.transformOrigin = '';
        doc.style.height = '';
        if (doc.scrollHeight > pageMax - 30) doc.classList.add('compact');
        if (doc.scrollHeight > pageMax) doc.classList.add('ultra');
        // Última red de seguridad: si aún excede, escalar uniformemente para forzar 1 hoja
        if (doc.scrollHeight > pageMax) {
          const scale = Math.max(0.6, pageMax / doc.scrollHeight);
          doc.style.transformOrigin = 'top center';
          doc.style.transform = 'scale(' + scale + ')';
          // Reservar el alto reducido para que no quede espacio fantasma
          doc.style.height = Math.ceil(doc.scrollHeight * scale) + 'px';
        }
      }
      function splitFichaImage() {
        const host = document.getElementById('ficha-split-host');
        if (!host) return;
        const src = host.getAttribute('data-ficha-src');
        if (!src) return;
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = function () {
          const w = img.naturalWidth, h = img.naturalHeight;
          if (!w || !h) { host.innerHTML = '<img src="' + src + '" style="max-width:100%;max-height:180px;object-fit:contain">'; return; }
          try {
            const cnv1 = document.createElement('canvas');
            const cnv2 = document.createElement('canvas');
            let html;
            if (w >= h) {
              // Imagen más ancha que alta -> partir VERTICALMENTE (mitad izq + mitad der) y APILAR
              const halfW = Math.floor(w / 2);
              cnv1.width = halfW; cnv1.height = h;
              cnv2.width = w - halfW; cnv2.height = h;
              cnv1.getContext('2d').drawImage(img, 0, 0, halfW, h, 0, 0, halfW, h);
              cnv2.getContext('2d').drawImage(img, halfW, 0, w - halfW, h, 0, 0, w - halfW, h);
              html = '<div style="width:100%;height:180px;display:flex;flex-direction:column;gap:3px">'
                + '<img src="' + cnv1.toDataURL('image/jpeg', 0.92) + '" style="width:100%;flex:1;min-height:0;object-fit:contain;border:1px solid #ddd;border-radius:3px;background:#fff">'
                + '<img src="' + cnv2.toDataURL('image/jpeg', 0.92) + '" style="width:100%;flex:1;min-height:0;object-fit:contain;border:1px solid #ddd;border-radius:3px;background:#fff">'
                + '</div>';
            } else {
              // Imagen más alta que ancha -> partir HORIZONTALMENTE (mitad arriba + mitad abajo) y poner LADO A LADO
              const halfH = Math.floor(h / 2);
              cnv1.width = w; cnv1.height = halfH;
              cnv2.width = w; cnv2.height = h - halfH;
              cnv1.getContext('2d').drawImage(img, 0, 0, w, halfH, 0, 0, w, halfH);
              cnv2.getContext('2d').drawImage(img, 0, halfH, w, h - halfH, 0, 0, w, h - halfH);
              html = '<div style="width:100%;height:180px;display:grid;grid-template-columns:1fr 1fr;gap:3px">'
                + '<img src="' + cnv1.toDataURL('image/jpeg', 0.92) + '" style="width:100%;height:100%;object-fit:contain;border:1px solid #ddd;border-radius:3px;background:#fff">'
                + '<img src="' + cnv2.toDataURL('image/jpeg', 0.92) + '" style="width:100%;height:100%;object-fit:contain;border:1px solid #ddd;border-radius:3px;background:#fff">'
                + '</div>';
            }
            host.outerHTML = html;
          } catch (e) {
            host.innerHTML = '<img src="' + src + '" style="max-width:100%;max-height:180px;object-fit:contain">';
          }
        };
        img.onerror = function () {
          host.innerHTML = '<div style="color:#94a3b8;font-style:italic;font-size:10px;text-align:center;padding:14px">No se pudo cargar la ficha</div>';
        };
        img.src = src;
      }
      // Expuesta globalmente: abre la foto N en ventana nueva (funciona desde iframe + dataURL)
      window.openFichaFoto = function (idx) {
        const arr = window.__fichaFotos || [];
        const url = arr[idx];
        if (!url) return;
        // Usar window.top.open para escapar del iframe del modal
        const opener = (window.top && window.top.open) ? window.top : window;
        const w = opener.open('', '_blank');
        if (!w) { alert('Permite ventanas emergentes para ver la foto.'); return; }
        try {
          w.document.write('<!DOCTYPE html><html><head><title>Ficha técnica — Foto ' + (idx+1) + '</title><style>'
            + 'html,body{margin:0;padding:0;background:#0a0a0a;display:flex;align-items:center;justify-content:center;min-height:100vh}'
            + 'img{max-width:100vw;max-height:100vh;display:block;object-fit:contain}'
            + '</style></head><body><img src="' + url + '"></body></html>');
          w.document.close();
        } catch (e) {
          alert('No se pudo abrir la foto.');
        }
      };
      function waitForImages() {
        const imgs = Array.from(document.querySelectorAll('.doc img'));
        if (!imgs.length) return Promise.resolve();
        return Promise.all(imgs.map(function (img) {
          if (img.complete && img.naturalHeight !== 0) return Promise.resolve();
          return new Promise(function (res) {
            img.addEventListener('load', res, { once: true });
            img.addEventListener('error', res, { once: true });
            // Safety timeout 2s
            setTimeout(res, 2000);
          });
        }));
      }
      async function fitWhenReady() {
        await waitForImages();
        // Doble RAF para garantizar layout final tras imágenes
        await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
        fitSinglePage();
      }
      function updateAudienceLabel() {
        const b = document.getElementById('btn-audience');
        if (b) b.textContent = audience === 'interno' ? 'Modo: Interno' : 'Modo: Cliente';
      }
      function isPdfUrl(u) {
        const s = String(u || '').slice(0, 200).toLowerCase();
        return s.includes('application/pdf') || /\.pdf(\?|$)/.test(s);
      }
      function parseCuentasJson(raw) {
        if (!raw) return null;
        if (Array.isArray(raw)) return raw;
        try { const a = JSON.parse(String(raw)); return Array.isArray(a) && a.length ? a : null; } catch (_) { return null; }
      }
      function render(cot, cliente, cfg, entrega) {
        const tipoLabel = cot.tipo === 'mano_obra' ? 'Mano de obra' : cot.tipo === 'refacciones' ? 'Refacciones' : (cot.tipo || 'Cotización');
        const moneda = (cot.moneda || 'MXN').toUpperCase();
        const tipoCambio = Number(cot.tipo_cambio) || 0;
        const subtotal = Number(cot.subtotal) || 0;
        const iva = Number(cot.iva) || 0;
        const total = Number(cot.total) || subtotal + iva;
        function fmtMonto(n) {
          if (moneda === 'USD') return 'US$' + Number(n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
          return '$' + Number(n || 0).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
        function fmtUsd(n) { return 'US$' + Number(n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
        function fmtMxn(n) { return '$' + Number(n || 0).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
        function tipoLineaLabelPdf(t) {
          const m = { refaccion: 'Refacción', vuelta: 'Vuelta', mano_obra: 'Mano de obra', equipo: 'Equipo / máquina', otro: 'Otro' };
          const k = String(t || '').trim();
          return esc(m[k] || (k ? k : '—'));
        }
        function lineDescPdf(l) {
          let desc = l.refaccion_descripcion
            ? (l.codigo ? (l.codigo + ' — ' + l.refaccion_descripcion) : l.refaccion_descripcion)
            : (l.descripcion || '');
          if (String(l.tipo_linea || '') === 'vuelta' && !String(desc || '').trim()) {
            const parts = [];
            if (Number(l.es_ida)) parts.push('Ida');
            const ht = Number(l.horas_trabajo) || 0;
            const htr = Number(l.horas_traslado) || 0;
            if (ht) parts.push(ht + 'h trabajo');
            if (htr) parts.push(htr + 'h traslado');
            desc = parts.length ? parts.join(' · ') : 'Vuelta';
          }
          return esc(desc);
        }
        function unitUsdMxn(l) {
          const pu = Number(l.precio_unitario || 0);
          let usd, mxn;
          if (moneda === 'USD') {
            usd = pu;
            mxn = tipoCambio > 0 ? pu * tipoCambio : null;
          } else {
            mxn = pu;
            if (l.precio_usd != null && l.precio_usd !== '') usd = Number(l.precio_usd);
            else usd = tipoCambio > 0 ? pu / tipoCambio : null;
          }
          return { usd, mxn };
        }
        const lineas = Array.isArray(cot.lineas) ? cot.lineas : [];
        let lineasHtml = '';
        if (lineas.length > 0) {
          lineasHtml = lineas.map(l => {
            const { usd, mxn } = unitUsdMxn(l);
            const colUsd = usd != null && !isNaN(usd) ? fmtUsd(usd) : '—';
            const colMxn = mxn != null && !isNaN(mxn) ? fmtMxn(mxn) : '—';
            return `<tr>
              <td style="font-size:0.78em">${tipoLineaLabelPdf(l.tipo_linea)}</td>
              <td style="font-size:0.82em;color:#0f172a;font-weight:600">${esc(l.codigo || '—')}</td>
              <td style="font-size:0.78em">${esc(l.maquina_nombre || '—')}</td>
              <td>${lineDescPdf(l)}</td>
              <td class="num">${Number(l.cantidad || 1)}</td>
              <td class="num">${colUsd}</td>
              <td class="num">${colMxn}</td>
              <td class="num">${fmtMonto(Number(l.subtotal || (l.cantidad || 1) * (l.precio_unitario || 0)))}</td>
            </tr>`;
          }).join('');
        } else {
          lineasHtml = `<tr><td>${esc(tipoLabel)}</td><td>—</td><td>—</td><td>${esc(tipoLabel)}</td><td class="num">1</td><td class="num">—</td><td class="num">—</td><td class="num">${fmtMonto(subtotal)}</td></tr>`;
        }
        const basePath = window.location.pathname.replace(/\/[^/]*$/, '') || '';
        const defaultLogo = basePath ? (window.location.origin + basePath + '/favicon.svg') : (window.location.origin + '/favicon.svg');
        const logoUrl = cfg.logoUrl || defaultLogo;
        const internalBox = audience === 'interno'
          ? `<div class="notes"><strong>Uso interno:</strong> ID #${esc(cot.id || '—')} · Cliente ID: ${esc(cot.cliente_id || '—')} · Tipo técnico: ${esc(cot.tipo || '—')}</div>`
          : '';
        // ===== IMAGEN DE MÁQUINA =====
        const imgUrl = cot.imagen_maquina_url ? String(cot.imagen_maquina_url) : '';
        const imgMaquinaHtml = imgUrl
          ? `<img src="${escAttr(imgUrl)}" alt="Máquina cotizada" onerror="this.parentNode.innerHTML='<span class=&quot;img-placeholder&quot;>No se pudo cargar la imagen</span>'">`
          : `<span class="img-placeholder">Sin imagen</span>`;
        // ===== FICHA TÉCNICA =====
        const fichaManualRaw = cot.ficha_tecnica_manual;
        let fichaManualArr = [];
        if (fichaManualRaw) {
          if (Array.isArray(fichaManualRaw)) fichaManualArr = fichaManualRaw;
          else { try { const a = JSON.parse(String(fichaManualRaw)); if (Array.isArray(a)) fichaManualArr = a; } catch (_) {} }
        }
        const fichaFotosRaw = cot.ficha_tecnica_fotos;
        let fichaFotosArr = [];
        if (fichaFotosRaw) {
          if (Array.isArray(fichaFotosRaw)) fichaFotosArr = fichaFotosRaw.filter(Boolean).slice(0,4);
          else { try { const a = JSON.parse(String(fichaFotosRaw)); if (Array.isArray(a)) fichaFotosArr = a.filter(Boolean).slice(0,4); } catch (_) {} }
        }
        // Guardar fotos globalmente para que el handler de click pueda abrirlas
        window.__fichaFotos = fichaFotosArr.slice();
        // Mini-botones de fotos (independientes del contenido — siempre arriba si existen)
        const fotosBtnsHtml = fichaFotosArr.length
          ? `<div class="no-print-foto-row" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">${fichaFotosArr.map((u,i) => `<button type="button" onclick="openFichaFoto(${i})" style="display:inline-flex;align-items:center;gap:4px;padding:4px 8px;background:var(--k);color:var(--y);border:1px solid var(--y);border-radius:4px;cursor:pointer;font-size:9.5px;font-weight:800;font-family:inherit"><img src="${escAttr(u)}" style="width:18px;height:18px;object-fit:cover;border-radius:2px;border:1px solid var(--y);pointer-events:none"> FOTO ${i+1}</button>`).join('')}</div>`
          : '';
        // Construcción del contenido: fotos (mini-botones) arriba + tabla manual abajo si existe
        let fichaContent = '';
        if (fichaManualArr.length) {
          // Agrupar por secciones: cada header inicia una nueva sección, sus rows hasta el siguiente header
          const sections = [];
          let cur = null;
          for (const r of fichaManualArr) {
            const t = r.type || 'pair';
            if (t === 'header') {
              cur = { title: r.label || '', rows: [] };
              sections.push(cur);
            } else {
              if (!cur) { cur = { title: null, rows: [] }; sections.push(cur); }
              cur.rows.push(r);
            }
          }
          const renderRow = (r) => {
            const t = r.type || 'pair';
            if (t === 'value-only') {
              return `<tr><td colspan="2" style="border:1px solid var(--border);padding:4px 7px;font-size:9.5px;color:#1e293b;background:#fff">${esc(r.value||'')}</td></tr>`;
            }
            // PAR: 50/50 alineado y simétrico
            return `<tr><th style="background:#fffbe6;border:1px solid var(--border);padding:4px 7px;text-align:left;font-size:9.5px;color:var(--k);font-weight:800;width:50%">${esc(r.label||'')}</th><td style="border:1px solid var(--border);padding:4px 7px;font-size:9.5px;color:#1e293b;width:50%">${esc(r.value||'')}</td></tr>`;
          };
          const renderSection = (s) => {
            const titleHtml = s.title
              ? `<div style="text-align:center;font-weight:900;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--k);padding:4px 6px;border:1px solid var(--border);border-bottom:none;background:#fff">${esc(s.title)}</div>`
              : '';
            const rowsHtml = s.rows.length
              ? `<table style="width:100%;border-collapse:collapse;margin:0;box-shadow:none;table-layout:fixed">${s.rows.map(renderRow).join('')}</table>`
              : '';
            return `<div>${titleHtml}${rowsHtml}</div>`;
          };
          const n = sections.length;
          const cols = n <= 1 ? 1 : (n === 2 ? 2 : (n === 3 ? 3 : 2));
          fichaContent = `<div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:6px;align-items:start">
            ${sections.map(renderSection).join('')}
          </div>`;
        }
        const fichaHtml = (fotosBtnsHtml || fichaContent)
          ? `${fotosBtnsHtml}${fichaContent}`
          : `<div class="ficha-empty">No se cargó ficha técnica para esta cotización</div>`;
        // ===== ATENDIDO POR =====
        const vendedorNombre = cot.atendido_por_nombre || cot.vendedor_catalogo_nombre || cot.vendedor || '—';
        const vendedorPuesto = cot.atendido_por_puesto || cot.vendedor_puesto || '';
        const vendedorTel = cot.vendedor_telefono || '';
        const vendedorMail = cot.vendedor_email || '';
        // ===== BANCARIOS =====
        const rfc = cot.bancarios_rfc || 'UMA000000XX0';
        const cuentas = parseCuentasJson(cot.bancarios_cuentas) || [
          { banco: 'BANORTE', moneda: 'PESOS', cuenta: '0000000000', clabe: '072000000000000000', suc: '———', swift: '———' },
          { banco: 'BANORTE', moneda: 'DÓLARES', cuenta: '0000000000', clabe: '072000000000000000', suc: '———', swift: 'MENOMXMTXXX' },
          { banco: 'BANAMEX', moneda: 'PESOS', cuenta: '0000000', clabe: '002000000000000000', suc: '0000', swift: '———' },
          { banco: 'BANAMEX', moneda: 'DÓLARES', cuenta: '0000000', clabe: '002000000000000000', suc: '0000', swift: 'BNMXMXMMXXX' },
        ];
        const cuentasRows = cuentas.map(c => `<tr><td>${esc(c.banco || '—')}</td><td>${esc(c.moneda || '—')}</td><td>${esc(c.cuenta || '—')}</td><td>${esc(c.clabe || '—')}</td><td>${esc(c.suc || '—')}</td><td>${esc(c.swift || '—')}</td></tr>`).join('');
        const alcanceDefault = 'Incluye suministro y/o ejecución conforme al tipo de cotización seleccionado, con validación técnica previa.';
        const siguienteDefault = 'Al autorizar, programamos fecha de atención y confirmamos entregables. Tiempo estimado sujeto a disponibilidad.';
        const alcance = cot.alcance_servicio || alcanceDefault;
        const siguiente = cot.siguiente_paso || siguienteDefault;
        const html = `
          <div class="doc" id="doc">
            <div class="head">
              <div class="brand">
                <img src="fondos/universal-logo.jpg" alt="UNIVERSAL" onerror="this.src='${escAttr(logoUrl)}'">
                <div>
                  <h1>UNIVERSAL MAQUINARIA</h1>
                  <p>Tel. 81 8366 8946 · Donde la competencia no existe</p>
                </div>
              </div>
              <div class="meta-mini">
                <div><strong>Folio:</strong> ${esc(cot.folio || '—')}</div>
                <div><strong>Fecha:</strong> ${fmtDate(cot.fecha)}</div>
                <div><strong>Vigencia:</strong> ${fmtDate(validHasta(cot.fecha))}</div>
              </div>
            </div>
            <div class="banner-total">
              TOTAL ${esc(moneda)}: ${fmtMonto(total)}${moneda === 'USD' && tipoCambio > 0 ? ' &nbsp;·&nbsp; T.C. ' + fmtNum(tipoCambio) : ''}
            </div>
            ${entrega ? `<div class="entrega-box entrega-${entrega.estado}" style="margin:6px 0;padding:8px 12px;border-radius:8px;border:2px solid;display:flex;align-items:center;gap:10px;font-size:11px">
              <i class="${entrega.bloquear ? 'fas fa-exclamation-triangle' : 'fas fa-truck-fast'}" style="font-size:18px"></i>
              <div><strong style="text-transform:uppercase;letter-spacing:0.08em;font-size:10px">Tiempo de entrega</strong><br>${esc(entrega.mensaje)}</div>
            </div>` : ''}
            <div class="title">COTIZACIÓN</div>
            <div class="meta-grid">
              <div class="chip"><strong>Folio:</strong> ${esc(cot.folio || '—')}</div>
              <div class="chip"><strong>Fecha emisión:</strong> ${fmtDate(cot.fecha)}</div>
              <div class="chip"><strong>Vigencia:</strong> ${fmtDate(validHasta(cot.fecha))}</div>
            </div>
            <div class="cols">
              <div class="block">
                <h3>Cliente</h3>
                <p><strong>${esc((cliente && cliente.nombre) || cot.cliente_nombre || '—')}</strong></p>
                ${cliente && cliente.rfc ? '<p>RFC: ' + esc(cliente.rfc) + '</p>' : ''}
                ${cliente && cliente.contacto ? '<p>Contacto: ' + esc(cliente.contacto) + '</p>' : ''}
                ${cliente && cliente.telefono ? '<p>Teléfono: ' + esc(cliente.telefono) + '</p>' : ''}
                ${cliente && cliente.ciudad ? '<p>Ciudad: ' + esc(cliente.ciudad) + '</p>' : ''}
              </div>
              <div class="block">
                <h3>Imagen de máquina</h3>
                <div class="img-maquina-card">${imgMaquinaHtml}</div>
              </div>
            </div>
            <div class="block totals">
              <h3>Resumen ${esc(moneda)}</h3>
              <p><span>Subtotal</span><span>${fmtMonto(subtotal)}</span></p>
              <p><span>IVA 16%</span><span>${fmtMonto(iva)}</span></p>
              <p><span>Total</span><span>${fmtMonto(total)}</span></p>
              ${moneda === 'USD' && tipoCambio > 0 ? `<p style="font-size:0.85em;color:#6b7280"><span>Equiv. MXN</span><span>$${fmtNum(total * tipoCambio)}</span></p>` : ''}
            </div>
            <table>
              <thead>
                <tr>
                  <th style="width:8%">Tipo</th>
                  <th style="width:8%">Código</th>
                  <th style="width:10%">Máquina</th>
                  <th>Descripción / concepto</th>
                  <th class="num" style="width:5%">Cant.</th>
                  <th class="num" style="width:9%">P. unit. USD</th>
                  <th class="num" style="width:9%">P. unit. MXN</th>
                  <th class="num" style="width:9%">Subtotal (${moneda})</th>
                </tr>
              </thead>
              <tbody>${lineasHtml}</tbody>
            </table>
            <div class="notes">
              <strong>Condiciones:</strong> Importes en <strong>${moneda}</strong>. Vigencia 30 días naturales, sujeto a disponibilidad.
              ${tipoCambio > 0 ? ' Tipo de cambio referencia: $' + fmtNum(tipoCambio) + ' MXN por 1 USD.' : ''}
            </div>
            ${internalBox}
            <div class="y-section">
              <div class="y-head">📎 Ficha técnica</div>
              <div class="y-body">${fichaHtml}</div>
            </div>
            <div class="proposal-grid">
              <article class="proposal-card">
                <h4>Alcance del servicio</h4>
                <p>${esc(alcance)}</p>
              </article>
              <article class="proposal-card">
                <h4>Siguiente paso</h4>
                <p>${esc(siguiente)}</p>
              </article>
            </div>
            <div class="y-section">
              <div class="y-head">👤 Atendido por</div>
              <div class="atendido-body">
                <div class="atendido-nombre">${esc(vendedorNombre)}${vendedorPuesto ? ' <span class="atendido-puesto">· ' + esc(vendedorPuesto) + '</span>' : ''}</div>
                ${vendedorTel || vendedorMail ? '<div class="atendido-contact">' + [vendedorTel ? '<span>📞 ' + esc(vendedorTel) + '</span>' : '', vendedorMail ? '<span>✉️ ' + esc(vendedorMail) + '</span>' : ''].filter(Boolean).join(' &nbsp; ') + '</div>' : ''}
              </div>
            </div>
            <div class="y-section">
              <div class="y-head">🏦 Información bancaria</div>
              <div class="bancarios-empresa"><strong>UNIVERSAL MAQUINARIA S.A. DE C.V.</strong> &nbsp; · &nbsp; RFC: <span class="bancarios-rfc">${esc(rfc)}</span></div>
              <table class="bancarios-table">
                <thead>
                  <tr><th>BANCO</th><th>MONEDA</th><th>CUENTA</th><th>CLABE</th><th>SUC.</th><th>SWIFT</th></tr>
                </thead>
                <tbody>${cuentasRows}</tbody>
              </table>
              <div class="bancarios-politica"><strong>Política de pago con cheque:</strong> Por seguridad financiera, cuando el pago sea con cheque la entrega de máquinas y/o refacciones se hará al siguiente día hábil del depósito previa confirmación de acreditamiento de fondos.</div>
            </div>
            <div class="doc-foot-banda">UNIVERSAL · DONDE LA COMPETENCIA NO EXISTE</div>
            <div class="doc-foot">Documento generado para fines informativos · Vigencia y disponibilidad sujetas a condiciones comerciales.</div>
          </div>
        `;
        document.getElementById('doc-body').innerHTML = html;
        fitSinglePage();
        fitWhenReady();
        updateAudienceLabel();
        document.getElementById('msg').textContent = 'Documento listo (Letter, 1 hoja).';
      }
      async function captureDocCanvas() {
        await fitWhenReady();
        const doc = document.querySelector('.doc');
        if (!doc || !window.html2canvas) throw new Error('html2canvas no disponible');
        return await window.html2canvas(doc, {
          scale: 2,
          useCORS: true,
          allowTaint: true,
          backgroundColor: '#ffffff',
          logging: false,
          windowWidth: doc.scrollWidth,
          windowHeight: doc.scrollHeight,
        });
      }
      async function downloadPdf() {
        try {
          document.getElementById('msg').textContent = 'Generando PDF…';
          const canvas = await captureDocCanvas();
          const jsPDFCtor = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF;
          if (!jsPDFCtor) throw new Error('jsPDF no disponible');
          // PDF con el MISMO tamaño que el canvas -> 1 sola página, idéntico a la vista
          const wMm = canvas.width * 0.264583;
          const hMm = canvas.height * 0.264583;
          const pdf = new jsPDFCtor({ orientation: hMm > wMm ? 'p' : 'l', unit: 'mm', format: [wMm, hMm] });
          pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, wMm, hMm);
          const folio = (document.title.match(/[A-Z0-9-]{5,}/) || ['cotizacion'])[0];
          pdf.save('Cotizacion_' + folio + '.pdf');
          document.getElementById('msg').textContent = 'PDF descargado.';
        } catch (e) {
          console.error(e);
          alert('Error al generar PDF: ' + (e.message || e));
          document.getElementById('msg').textContent = 'Error al generar PDF.';
        }
      }
      async function runPrint() {
        try {
          document.getElementById('msg').textContent = 'Preparando impresión…';
          const canvas = await captureDocCanvas();
          const jsPDFCtor = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF;
          if (!jsPDFCtor) throw new Error('jsPDF no disponible');
          // MISMO PDF que el botón "Descargar PDF" -> imprimir lo idéntico
          const wMm = canvas.width * 0.264583;
          const hMm = canvas.height * 0.264583;
          const pdf = new jsPDFCtor({ orientation: hMm > wMm ? 'p' : 'l', unit: 'mm', format: [wMm, hMm] });
          pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, wMm, hMm);
          pdf.autoPrint();
          const blobUrl = pdf.output('bloburl');
          window.open(blobUrl, '_blank');
          document.getElementById('msg').textContent = 'Documento listo.';
        } catch (e) {
          console.error(e);
          alert('Error al imprimir: ' + (e.message || e));
        }
      }
      document.getElementById('btn-print').addEventListener('click', runPrint);
      document.getElementById('btn-pdf').addEventListener('click', downloadPdf);
      document.getElementById('btn-close').addEventListener('click', function () { window.close(); });
      document.getElementById('btn-audience').addEventListener('click', function () {
        audience = audience === 'cliente' ? 'interno' : 'cliente';
        localStorage.setItem('pdf-audience', audience);
        load();
      });
      // ===== TIEMPO DE ENTREGA DINÁMICO =====
      // Según estado de la máquina determina fecha estimada de entrega
      // - Disponible en almacén: hoy + 3 a 5 días
      // - Revisión programada (estado_preparacion='pendiente' con fecha_lista_estimada): fecha_lista + 3 a 5 días
      // - En embarque (eta_fecha futura): eta + 3 a 5 días
      // - Sin ubicación / sin info: bloquear con mensaje
      function calcularEntregaEstimada(maquina, embarques) {
        if (!maquina) return { estado: 'desconocido', bloquear: true, mensaje: 'No se identificó la máquina cotizada. Se revisará para dar fecha.' };
        const hoyIso = new Date().toISOString().slice(0, 10);
        const addDays = (iso, days) => {
          const d = new Date(iso + 'T00:00:00');
          d.setDate(d.getDate() + Number(days));
          return d.toISOString().slice(0, 10);
        };
        const fmt = (iso) => {
          try { const d = new Date(iso + 'T12:00:00'); return d.toLocaleDateString('es-MX', { day: '2-digit', month: 'long', year: 'numeric' }); } catch (_) { return iso; }
        };
        // 1) ¿En embarque? Buscar embarque con numero_serie igual o nombre que coincida
        const sn = String(maquina.numero_serie || '').trim().toLowerCase();
        const modelo = String(maquina.modelo || maquina.nombre || '').trim().toLowerCase();
        const embarqueMatch = (Array.isArray(embarques) ? embarques : []).find(e => {
          const eSn = String(e.numero_serie || '').trim().toLowerCase();
          const eNm = String(e.nombre_maquina || '').trim().toLowerCase();
          const estPend = String(e.estado || '').toLowerCase();
          if (estPend === 'entregado' || estPend === 'cancelado') return false;
          if (sn && eSn && sn === eSn) return true;
          if (modelo && eNm && modelo === eNm) return true;
          return false;
        });
        if (embarqueMatch && embarqueMatch.eta_fecha) {
          const eta = String(embarqueMatch.eta_fecha).slice(0, 10);
          const desde = addDays(eta, 3);
          const hasta = addDays(eta, 5);
          return {
            estado: 'embarque',
            bloquear: false,
            etaFecha: eta,
            desde, hasta,
            mensaje: `Máquina en embarque, llegada estimada ${fmt(eta)}. Entrega estimada ${fmt(desde)} – ${fmt(hasta)} (3-5 días tras llegada).`,
          };
        }
        // 2) ¿En revisión programada?
        const estadoPrep = String(maquina.estado_preparacion || '').toLowerCase();
        if (estadoPrep === 'pendiente') {
          const flista = maquina.fecha_lista_estimada ? String(maquina.fecha_lista_estimada).slice(0, 10) : null;
          if (flista && flista >= hoyIso) {
            const desde = addDays(flista, 3);
            const hasta = addDays(flista, 5);
            return {
              estado: 'revision',
              bloquear: false,
              listaFecha: flista,
              desde, hasta,
              mensaje: `Máquina en revisión programada, lista el ${fmt(flista)}. Entrega estimada ${fmt(desde)} – ${fmt(hasta)} (3-5 días tras revisión).`,
            };
          }
          return {
            estado: 'revision-sin-fecha',
            bloquear: true,
            mensaje: 'Máquina en revisión. Aún no hay fecha estimada de salida. Se revisará para dar fecha de entrega.',
          };
        }
        // 3) Disponible en almacén (stock > 0 ó estado_preparacion 'lista')
        const stock = Number(maquina.stock || 0);
        if (estadoPrep === 'lista' || stock > 0 || maquina.ubicacion) {
          const desde = addDays(hoyIso, 3);
          const hasta = addDays(hoyIso, 5);
          return {
            estado: 'disponible',
            bloquear: false,
            desde, hasta,
            mensaje: `Máquina disponible. Entrega estimada ${fmt(desde)} – ${fmt(hasta)} (3-5 días hábiles).`,
          };
        }
        // 4) Sin ubicación
        return {
          estado: 'sin-ubicacion',
          bloquear: true,
          mensaje: '⚠️ Máquina sin ubicación confirmada. Cotización pendiente de revisión para dar fecha de entrega.',
        };
      }
      async function load() {
        try {
          const saved = localStorage.getItem('pdf-audience');
          if (saved === 'interno' || saved === 'cliente') audience = saved;
          const [cot, cfg] = await Promise.all([
            getJson(API + '/cotizaciones/' + id),
            getJson(API + '/config').catch(() => ({})),
          ]);
          let cliente = null;
          if (cot.cliente_id) cliente = await getJson(API + '/clientes/' + cot.cliente_id).catch(() => null);
          // Tiempo entrega dinámico: cargar máquina y embarques relacionados
          let entrega = null;
          try {
            let maquinaIds = [];
            if (cot.maquinas_ids) { try { const a = JSON.parse(cot.maquinas_ids); if (Array.isArray(a)) maquinaIds = a; } catch (_) {} }
            const primaryMaq = maquinaIds.length ? maquinaIds[0] : null;
            if (primaryMaq) {
              const [maq, embarques] = await Promise.all([
                getJson(API + '/maquinas/' + primaryMaq).catch(() => null),
                getJson(API + '/embarques').catch(() => []),
              ]);
              entrega = calcularEntregaEstimada(maq, embarques);
            }
          } catch (_) { /* entrega queda en null */ }
          render(cot, cliente, cfg || {}, entrega);
          if (shouldAutoPrint) setTimeout(runPrint, 800);
        } catch (e) {
          document.getElementById('doc-body').innerHTML = '<div class="error">' + esc(e.message || 'No se pudo cargar la cotización.') + '</div>';
          document.getElementById('msg').textContent = 'Error al cargar.';
        }
      }
      load();
    })();
  </script>
