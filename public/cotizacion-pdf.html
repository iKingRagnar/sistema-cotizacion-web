<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cotización</title>
  <style>
    * { box-sizing: border-box; }
    :root { --p: #1e3a5f; --a: #0d9488; --ink: #0f172a; --muted: #475569; }
    @page { size: A4 portrait; margin: 8mm; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background: linear-gradient(160deg, #eef2ff 0%, #f0fdfa 45%, #f8fafc 100%);
      font-size: 10pt;
      line-height: 1.32;
    }
    .no-print {
      position: sticky;
      top: 0;
      z-index: 1000;
      padding: 10px 14px;
      background: linear-gradient(90deg, #0f172a 0%, var(--p) 55%, var(--a) 100%);
      color: #e2e8f0;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 18px rgba(15, 23, 42, 0.35);
    }
    .no-print button {
      border: none;
      border-radius: 8px;
      padding: 7px 11px;
      font-weight: 700;
      cursor: pointer;
    }
    #btn-print { background: #14b8a6; color: #fff; }
    #btn-close { background: #475569; color: #fff; }
    .doc {
      width: 100%;
      max-width: 196mm;
      margin: 0 auto;
      padding: 7mm 8mm;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.12);
    }
    .head {
      border-radius: 12px;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: #fff;
      background: linear-gradient(125deg, var(--p), #2563eb 58%, var(--a));
    }
    .brand { display: flex; align-items: center; gap: 8px; }
    .brand img { width: 36px; height: 36px; border-radius: 8px; background: rgba(255,255,255,0.2); padding: 2px; }
    .brand h1 { margin: 0; font-size: 13px; }
    .brand p { margin: 2px 0 0 0; font-size: 10px; opacity: .9; }
    .meta-mini { font-size: 10px; text-align: right; }
    .title {
      margin: 8px 0 9px;
      text-align: center;
      font-size: 19px;
      font-weight: 900;
      letter-spacing: .08em;
      color: var(--p);
    }
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }
    .chip { border: 1px solid #cbd5e1; border-radius: 10px; padding: 7px; background: #f8fafc; font-size: 10px; }
    .chip strong { color: #0f766e; }
    .insight-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 7px; margin-bottom: 8px; }
    .insight {
      border: 1px solid #dbeafe;
      border-radius: 9px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      padding: 6px 7px;
    }
    .insight .k { font-size: 9px; color: #64748b; text-transform: uppercase; letter-spacing: .04em; }
    .insight .v { margin-top: 2px; font-size: 11px; font-weight: 800; color: #0f172a; }
    .cols { display: grid; grid-template-columns: 1.4fr 1fr; gap: 8px; margin-bottom: 8px; }
    .block { border: 1px solid #cbd5e1; border-radius: 10px; padding: 8px; background: #fff; }
    .block h3 { margin: 0 0 5px; font-size: 10px; color: #0f766e; letter-spacing: .08em; text-transform: uppercase; }
    .block p { margin: 2px 0; font-size: 10px; color: #1e293b; }
    .totals { border: 1px solid #99f6e4; background: #f0fdfa; }
    .totals p { display: flex; justify-content: space-between; font-weight: 700; }
    .totals p:last-child { color: #115e59; font-size: 11px; border-top: 1px dashed #99f6e4; padding-top: 4px; }
    table { width: 100%; border-collapse: collapse; margin: 7px 0; font-size: 10px; }
    th, td { border: 1px solid #dbeafe; padding: 6px; }
    th { background: #eff6ff; color: #1e3a8a; text-transform: uppercase; letter-spacing: .04em; font-size: 9px; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .notes {
      margin-top: 6px;
      border: 1px solid #fde68a;
      background: #fffbeb;
      border-radius: 8px;
      padding: 7px 8px;
      font-size: 9.5px;
      color: #475569;
    }
    .proposal-grid { margin-top: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .proposal-card { border: 1px solid #dbeafe; border-radius: 8px; padding: 7px; background: #f8fbff; }
    .proposal-card h4 { margin: 0 0 4px; font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: #1e3a8a; }
    .proposal-card p { margin: 0; font-size: 9.5px; color: #475569; line-height: 1.35; }
    .sign { margin-top: 12px; padding-top: 6px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .line { border-bottom: 1.5px solid #94a3b8; height: 14px; margin-bottom: 2px; }
    .lbl { font-size: 9px; color: #64748b; text-transform: uppercase; }
    .doc.compact { font-size: 9.3pt; line-height: 1.24; }
    .doc.compact .title { margin: 6px 0; font-size: 17px; }
    .doc.compact th, .doc.compact td { padding: 5px; }
    .doc.compact .meta-grid, .doc.compact .cols, .doc.compact .sign { gap: 6px; margin-bottom: 6px; }
    .doc.ultra { font-size: 8.8pt; line-height: 1.18; }
    .doc.ultra .notes { font-size: 9px; }
    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      body { background: #fff; }
      .no-print { display: none !important; }
      .doc { margin: 0; border-radius: 0; border: none; box-shadow: none; max-width: none; padding: 0; }
    }
    .error { margin: 1rem auto; max-width: 700px; padding: 1rem; border-radius: 10px; border: 1px solid #fecaca; background: #fef2f2; color: #991b1b; }
  </style>
</head>
<body>
  <div class="no-print">
    <span id="msg">Cargando cotización…</span>
    <button type="button" id="btn-audience">Modo: Cliente</button>
    <button type="button" id="btn-print">Imprimir / Guardar PDF</button>
    <button type="button" id="btn-close">Cerrar</button>
  </div>
  <div id="doc-body"></div>
  <script>
    (function () {
      const AUTH_TOKEN_KEY = 'cotizacion-auth-token';
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const shouldAutoPrint = params.get('autoprint') !== '0';
      let audience = (params.get('audience') || 'cliente').toLowerCase();
      if (audience !== 'interno') audience = 'cliente';
      const API = window.location.pathname.replace(/\/[^/]*$/, '') + '/api';
      if (!id) {
        document.getElementById('doc-body').innerHTML = '<div class="error">Falta el ID de la cotización (ej. ?id=1).</div>';
        document.getElementById('msg').textContent = '';
        return;
      }
      function esc(s) { if (s == null) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
      function fmtNum(n) { return Number(n || 0).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
      function fmtDate(s) { return s ? String(s).slice(0, 10) : '—'; }
      function validHasta(fecha) { const d = new Date(fecha || Date.now()); d.setDate(d.getDate() + 30); return d.toISOString().slice(0, 10); }
      function authHeaders() {
        try {
          const t = localStorage.getItem(AUTH_TOKEN_KEY);
          return t ? { Authorization: 'Bearer ' + t } : {};
        } catch (_) { return {}; }
      }
      async function getJson(url) {
        const r = await fetch(url, { headers: authHeaders() });
        if (!r.ok) throw new Error('No se pudo cargar el documento.');
        return r.json();
      }
      function fitSinglePage() {
        const doc = document.querySelector('.doc');
        if (!doc) return;
        const pageMax = Math.round(277 * 3.7795);
        if (doc.scrollHeight > pageMax) doc.classList.add('compact');
        if (doc.scrollHeight > pageMax) doc.classList.add('ultra');
      }
      function updateAudienceLabel() {
        const b = document.getElementById('btn-audience');
        if (b) b.textContent = audience === 'interno' ? 'Modo: Interno' : 'Modo: Cliente';
      }
      function render(cot, cliente, cfg) {
        const tipoLabel = cot.tipo === 'mano_obra' ? 'Mano de obra' : cot.tipo === 'refacciones' ? 'Refacciones' : (cot.tipo || 'Cotización');
        const moneda = (cot.moneda || 'MXN').toUpperCase();
        const tipoCambio = Number(cot.tipo_cambio) || 0;
        const subtotal = Number(cot.subtotal) || 0;
        const iva = Number(cot.iva) || 0;
        const total = Number(cot.total) || subtotal + iva;
        const monedaEtiqueta = moneda === 'USD' ? 'USD — Dólares estadounidenses' : 'MXN — Pesos mexicanos';
        function fmtMonto(n) {
          if (moneda === 'USD') return 'US$' + Number(n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
          return '$' + Number(n || 0).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
        function fmtUsd(n) {
          return 'US$' + Number(n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
        function fmtMxn(n) {
          return '$' + Number(n || 0).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
        /** Precio unitario en USD y MXN por línea (precio_unitario va en moneda de la cotización). */
        function unitUsdMxn(l) {
          const pu = Number(l.precio_unitario || 0);
          let usd;
          let mxn;
          if (moneda === 'USD') {
            usd = pu;
            mxn = tipoCambio > 0 ? pu * tipoCambio : null;
          } else {
            mxn = pu;
            if (l.precio_usd != null && l.precio_usd !== '') usd = Number(l.precio_usd);
            else usd = tipoCambio > 0 ? pu / tipoCambio : null;
          }
          return { usd, mxn };
        }
        // Construir filas: Código → Descripción → Cantidad → USD → MXN → Subtotal (moneda cotización)
        const lineas = Array.isArray(cot.lineas) ? cot.lineas : [];
        let lineasHtml = '';
        if (lineas.length > 0) {
          lineasHtml = lineas.map(l => {
            const { usd, mxn } = unitUsdMxn(l);
            const colUsd = usd != null && !isNaN(usd) ? fmtUsd(usd) : '—';
            const colMxn = mxn != null && !isNaN(mxn) ? fmtMxn(mxn) : '—';
            const desc = esc(l.descripcion || l.refaccion_descripcion || l.concepto || '');
            return `<tr>
              <td style="font-size:0.85em;color:#334155;font-weight:600">${esc(l.codigo || '—')}</td>
              <td>${desc}</td>
              <td class="num">${Number(l.cantidad || 1)}</td>
              <td class="num">${colUsd}</td>
              <td class="num">${colMxn}</td>
              <td class="num">${fmtMonto(Number(l.subtotal || (l.cantidad || 1) * (l.precio_unitario || 0)))}</td>
            </tr>`;
          }).join('');
        } else {
          lineasHtml = `<tr>
            <td>—</td>
            <td>${esc(tipoLabel)}</td>
            <td class="num">1</td>
            <td class="num">—</td>
            <td class="num">—</td>
            <td class="num">${fmtMonto(subtotal)}</td>
          </tr>`;
        }
        const basePath = window.location.pathname.replace(/\/[^/]*$/, '') || '';
        const defaultLogo = basePath ? (window.location.origin + basePath + '/favicon.svg') : (window.location.origin + '/favicon.svg');
        const logoUrl = cfg.logoUrl || defaultLogo;
        const shortName = cfg.shortName || cfg.appName || 'Gestor Administrativo';
        const tagline = cfg.tagline || 'Cotizaciones y operaciones empresariales';
        const internalBox = audience === 'interno'
          ? `<div class="notes"><strong>Uso interno:</strong> ID #${esc(cot.id || '—')} · Cliente ID: ${esc(cot.cliente_id || '—')} · Tipo técnico: ${esc(cot.tipo || '—')}</div>`
          : '';
        const html = `
          <div class="doc" id="doc">
            <div class="head">
              <div class="brand">
                <img src="${esc(logoUrl)}" alt="">
                <div>
                  <h1>${esc(shortName)}</h1>
                  <p>${esc(tagline)}</p>
                </div>
              </div>
              <div class="meta-mini">
                <div><strong>Documento:</strong> Cotización</div>
                <div><strong>Impresión:</strong> ${fmtDate(new Date().toISOString())}</div>
              </div>
            </div>
            <div class="title">COTIZACIÓN</div>
            <div class="meta-grid">
              <div class="chip"><strong>Folio:</strong> ${esc(cot.folio || '—')}</div>
              <div class="chip"><strong>Fecha emisión:</strong> ${fmtDate(cot.fecha)}</div>
              <div class="chip"><strong>Vigencia:</strong> ${fmtDate(validHasta(cot.fecha))}</div>
            </div>
            <div class="insight-grid">
              <div class="insight"><div class="k">Modalidad</div><div class="v">${esc(tipoLabel)}</div></div>
              <div class="insight"><div class="k">Moneda de cotización</div><div class="v">${esc(monedaEtiqueta)}${tipoCambio > 0 ? ' · T.C. ' + fmtNum(tipoCambio) + ' MXN/USD' : ''}</div></div>
              <div class="insight"><div class="k">IVA aplicado</div><div class="v">16%</div></div>
              <div class="insight"><div class="k">Importe final</div><div class="v">${fmtMonto(total)}</div></div>
            </div>
            <div class="cols">
              <div class="block">
                <h3>Cliente</h3>
                <p><strong>${esc((cliente && cliente.nombre) || cot.cliente_nombre || '—')}</strong></p>
                ${cliente && cliente.rfc ? '<p>RFC: ' + esc(cliente.rfc) + '</p>' : ''}
                ${cliente && cliente.contacto ? '<p>Contacto: ' + esc(cliente.contacto) + '</p>' : ''}
                ${cliente && cliente.telefono ? '<p>Teléfono: ' + esc(cliente.telefono) + '</p>' : ''}
                ${cliente && cliente.ciudad ? '<p>Ciudad: ' + esc(cliente.ciudad) + '</p>' : ''}
              </div>
              <div class="block totals">
                <h3>Resumen <small style="font-weight:400;color:#6b7280">${moneda}</small></h3>
                <p><span>Subtotal</span><span>${fmtMonto(subtotal)}</span></p>
                <p><span>IVA 16%</span><span>${fmtMonto(iva)}</span></p>
                <p><span>Total</span><span>${fmtMonto(total)}</span></p>
                ${moneda === 'USD' && tipoCambio > 0 ? `<p style="font-size:0.8em;color:#6b7280"><span>Equiv. MXN</span><span>$${fmtNum(total * tipoCambio)}</span></p>` : ''}
              </div>
            </div>
            ${moneda === 'USD' && tipoCambio > 0 ? `<p style="font-size:0.8em;color:#6b7280;margin-bottom:0.5rem">Tipo de cambio aplicado: 1 USD = $${fmtNum(tipoCambio)} MXN</p>` : ''}
            <table>
              <thead>
                <tr>
                  <th style="width:9%">Código</th>
                  <th>Descripción / concepto</th>
                  <th class="num" style="width:6%">Cant.</th>
                  <th class="num" style="width:11%">Precio unit. (USD)</th>
                  <th class="num" style="width:11%">Precio unit. (MXN)</th>
                  <th class="num" style="width:11%">Subtotal (${moneda})</th>
                </tr>
              </thead>
              <tbody>
                ${lineasHtml}
              </tbody>
            </table>
            <div class="notes">
              <strong>Condiciones:</strong> Importes de cotización en <strong>${moneda}</strong> (columna Subtotal). Columnas de precio unitario muestran referencia en <strong>USD</strong> y <strong>MXN</strong>. Vigencia 30 días naturales, sujeto a disponibilidad.
              ${tipoCambio > 0 ? ' Tipo de cambio referencia: $' + fmtNum(tipoCambio) + ' MXN por 1 USD.' : ''}
            </div>
            ${internalBox}
            <div class="proposal-grid">
              <article class="proposal-card">
                <h4>Alcance del servicio</h4>
                <p>Incluye suministro y/o ejecución conforme al tipo de cotización seleccionado, con validación técnica previa.</p>
              </article>
              <article class="proposal-card">
                <h4>Siguiente paso</h4>
                <p>Al autorizar, programamos fecha de atención y confirmamos entregables. Tiempo estimado sujeto a disponibilidad.</p>
              </article>
            </div>
            <div class="sign">
              <div><div class="line"></div><div class="lbl">Firma de aceptación</div></div>
              <div><div class="line"></div><div class="lbl">Nombre y fecha</div></div>
            </div>
          </div>
        `;
        document.getElementById('doc-body').innerHTML = html;
        fitSinglePage();
        updateAudienceLabel();
        document.getElementById('msg').textContent = 'Documento listo en formato optimizado para una sola página A4.';
      }
      function runPrint() { window.print(); }
      document.getElementById('btn-print').addEventListener('click', runPrint);
      document.getElementById('btn-close').addEventListener('click', function () { window.close(); });
      document.getElementById('btn-audience').addEventListener('click', function () {
        audience = audience === 'cliente' ? 'interno' : 'cliente';
        localStorage.setItem('pdf-audience', audience);
        load();
      });
      async function load() {
        try {
          const saved = localStorage.getItem('pdf-audience');
          if (saved === 'interno' || saved === 'cliente') audience = saved;
          const [cot, cfg] = await Promise.all([
            getJson(API + '/cotizaciones/' + id),
            getJson(API + '/config').catch(() => ({})),
          ]);
          let cliente = null;
          if (cot.cliente_id) cliente = await getJson(API + '/clientes/' + cot.cliente_id).catch(() => null);
          render(cot, cliente, cfg || {});
          if (shouldAutoPrint) setTimeout(runPrint, 350);
        } catch (e) {
          document.getElementById('doc-body').innerHTML = '<div class="error">' + esc(e.message || 'No se pudo cargar la cotización.') + '</div>';
          document.getElementById('msg').textContent = 'Error al cargar.';
        }
      }
      load();
    })();
  </script>
</body>
</html>
