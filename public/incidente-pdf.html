<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reporte de incidente</title>
  <style>
    * { box-sizing: border-box; }
    :root { --p: #1e3a5f; --a: #0d9488; --danger: #c2410c; --ink: #0f172a; }
    html { cursor: default; }
    @page { size: A4 portrait; margin: 8mm; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background: linear-gradient(160deg, #fff7ed 0%, #ffedd5 38%, #f8fafc 100%);
      font-size: 10pt;
      line-height: 1.3;
      cursor: default;
    }
    .no-print {
      position: sticky;
      top: 0;
      z-index: 1000;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      background: linear-gradient(90deg, #7c2d12 0%, #c2410c 45%, #ea580c 100%);
      box-shadow: 0 4px 18px rgba(124, 45, 18, 0.35);
    }
    .no-print button { border: none; border-radius: 8px; padding: 7px 11px; font-weight: 700; cursor: pointer; }
    #btn-print { background: #fb923c; color: #fff; }
    #btn-close { background: #475569; color: #fff; }
    .doc {
      max-width: 196mm;
      margin: 0 auto;
      padding: 7mm 8mm;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.12);
    }
    .head {
      border-radius: 12px;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: #fff;
      background: linear-gradient(130deg, #9a3412, #ea580c 58%, #fb923c);
    }
    .brand { display: flex; align-items: center; gap: 8px; }
    .brand img { width: 34px; height: 34px; border-radius: 8px; padding: 2px; background: rgba(255,255,255,0.2); }
    .brand h1 { margin: 0; font-size: 13px; }
    .brand p { margin: 2px 0 0; opacity: .9; font-size: 10px; }
    .meta-mini { font-size: 10px; text-align: right; }
    .title {
      margin: 8px 0;
      text-align: center;
      font-size: 18px;
      letter-spacing: .08em;
      color: var(--danger);
      font-weight: 900;
    }
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
      margin-bottom: 8px;
    }
    .chip { border: 1px solid #fed7aa; border-radius: 9px; padding: 6px; background: #fff7ed; font-size: 10px; }
    .chip strong { color: #9a3412; }
    .insight-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 7px; margin-bottom: 8px; }
    .insight {
      border: 1px solid #fed7aa;
      border-radius: 9px;
      background: #fffaf5;
      padding: 6px 7px;
    }
    .insight .k { font-size: 9px; color: #9a3412; text-transform: uppercase; letter-spacing: .04em; }
    .insight .v { margin-top: 2px; font-size: 11px; font-weight: 800; color: #7c2d12; }
    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .table-box { border: 1px solid #fdba74; border-radius: 10px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 10px; }
    th, td { border: 1px solid #fed7aa; padding: 6px; text-align: left; }
    th { background: #ffedd5; color: #7c2d12; width: 38%; }
    .desc {
      border: 1px solid #fdba74;
      border-left: 4px solid #ea580c;
      border-radius: 10px;
      padding: 8px;
      background: #fffaf5;
    }
    .desc h3 { margin: 0 0 5px; font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: #c2410c; }
    .desc p { margin: 0; font-size: 10px; color: #334155; white-space: pre-wrap; }
    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .03em;
    }
    .b-alta { background: #fef08a; color: #854d0e; border: 1px solid #eab308; }
    .b-critica { background: #fecaca; color: #7f1d1d; border: 1px solid #ef4444; }
    .b-media { background: #bfdbfe; color: #1e3a8a; border: 1px solid #3b82f6; }
    .b-baja { background: #bbf7d0; color: #14532d; border: 1px solid #22c55e; }
    .action-grid { margin-top: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .action-card { border: 1px solid #fed7aa; border-radius: 8px; padding: 7px; background: #fff7ed; }
    .action-card h4 { margin: 0 0 4px; font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: #9a3412; }
    .action-card p { margin: 0; font-size: 9.5px; color: #475569; line-height: 1.35; }
    .sign { margin-top: 12px; padding-top: 6px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .line { border-bottom: 1.5px solid #94a3b8; height: 14px; margin-bottom: 2px; }
    .lbl { font-size: 9px; color: #64748b; text-transform: uppercase; }
    .doc.compact { font-size: 9.2pt; line-height: 1.2; }
    .doc.compact th, .doc.compact td, .doc.compact .chip { padding: 5px; }
    .doc.ultra { font-size: 8.7pt; line-height: 1.15; }
    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      body { background: #fff; }
      .no-print { display: none !important; }
      .doc { margin: 0; border: none; border-radius: 0; box-shadow: none; max-width: none; padding: 0; }
    }
    .error { margin: 1rem auto; max-width: 700px; padding: 1rem; border-radius: 10px; border: 1px solid #fecaca; background: #fef2f2; color: #991b1b; }
  </style>
</head>
<body>
  <div class="no-print">
    <span id="msg">Cargando reporte…</span>
    <button type="button" id="btn-audience">Modo: Cliente</button>
    <button type="button" id="btn-print">Imprimir / Guardar PDF</button>
    <button type="button" id="btn-close">Cerrar</button>
  </div>
  <div id="doc-body"></div>
  <script>
    (function () {
      const AUTH_TOKEN_KEY = 'cotizacion-auth-token';
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const shouldAutoPrint = params.get('autoprint') !== '0';
      let audience = (params.get('audience') || 'cliente').toLowerCase();
      if (audience !== 'interno') audience = 'cliente';
      const API = window.location.pathname.replace(/\/[^/]*$/, '') + '/api';
      if (!id) {
        document.getElementById('doc-body').innerHTML = '<div class="error">Falta el ID del incidente (ej. ?id=1).</div>';
        document.getElementById('msg').textContent = '';
        return;
      }
      function esc(s) { if (s == null) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
      function fmtDate(s) { return s ? String(s).slice(0, 10) : '—'; }
      function authHeaders() {
        try {
          const t = localStorage.getItem(AUTH_TOKEN_KEY);
          return t ? { Authorization: 'Bearer ' + t } : {};
        } catch (_) { return {}; }
      }
      function badgeClass(x) {
        x = String(x || '').toLowerCase();
        if (x === 'critica') return 'b-critica';
        if (x === 'alta') return 'b-alta';
        if (x === 'media') return 'b-media';
        return 'b-baja';
      }
      async function getJson(url) {
        const r = await fetch(url, { headers: authHeaders() });
        if (!r.ok) throw new Error('No se pudo cargar el incidente.');
        return r.json();
      }
      function fitSinglePage() {
        const doc = document.querySelector('.doc');
        if (!doc) return;
        const pageMax = Math.round(277 * 3.7795);
        if (doc.scrollHeight > pageMax) doc.classList.add('compact');
        if (doc.scrollHeight > pageMax) doc.classList.add('ultra');
      }
      function updateAudienceLabel() {
        const b = document.getElementById('btn-audience');
        if (b) b.textContent = audience === 'interno' ? 'Modo: Interno' : 'Modo: Cliente';
      }
      function render(inc, cfg) {
        const basePath = window.location.pathname.replace(/\/[^/]*$/, '') || '';
        const defaultLogo = basePath ? (window.location.origin + basePath + '/favicon.svg') : (window.location.origin + '/favicon.svg');
        const shortName = cfg.shortName || cfg.appName || 'Gestor Administrativo';
        const tagline = cfg.tagline || 'Gestión de incidentes y SLA';
        const internalBox = audience === 'interno'
          ? `<div class="desc" style="margin-top:8px;"><h3>Datos internos</h3><p>ID #${esc(inc.id || '—')} · Cliente ID: ${esc(inc.cliente_id || '—')} · Máquina ID: ${esc(inc.maquina_id || '—')}</p></div>`
          : '';
        const html = `
          <div class="doc">
            <div class="head">
              <div class="brand">
                <img src="${esc(cfg.logoUrl || defaultLogo)}" alt="">
                <div>
                  <h1>${esc(shortName)}</h1>
                  <p>${esc(tagline)}</p>
                </div>
              </div>
              <div class="meta-mini">
                <div><strong>Documento:</strong> Incidente</div>
                <div><strong>Impresión:</strong> ${fmtDate(new Date().toISOString())}</div>
              </div>
            </div>
            <div class="title">REPORTE DE INCIDENTE</div>
            <div class="meta-grid">
              <div class="chip"><strong>Folio:</strong> ${esc(inc.folio || '—')}</div>
              <div class="chip"><strong>Reporte:</strong> ${fmtDate(inc.fecha_reporte)}</div>
              <div class="chip"><strong>Vencimiento:</strong> ${fmtDate(inc.fecha_vencimiento)}</div>
              <div class="chip"><strong>Cierre:</strong> ${fmtDate(inc.fecha_cerrado)}</div>
            </div>
            <div class="insight-grid">
              <div class="insight"><div class="k">Prioridad</div><div class="v">${esc(inc.prioridad || 'media')}</div></div>
              <div class="insight"><div class="k">Estatus</div><div class="v">${esc(inc.estatus || 'abierto')}</div></div>
              <div class="insight"><div class="k">Técnico</div><div class="v">${esc(inc.tecnico_responsable || 'N/D')}</div></div>
            </div>
            <div class="layout">
              <div class="table-box">
                <table>
                  <tr><th>Cliente</th><td>${esc(inc.cliente_nombre || '—')}</td></tr>
                  <tr><th>Máquina</th><td>${esc(inc.maquina_nombre || '—')}</td></tr>
                  <tr><th>Técnico</th><td>${esc(inc.tecnico_responsable || '—')}</td></tr>
                  <tr><th>Prioridad</th><td><span class="badge ${badgeClass(inc.prioridad)}">${esc(inc.prioridad || 'media')}</span></td></tr>
                  <tr><th>Estatus</th><td>${esc(inc.estatus || 'abierto')}</td></tr>
                </table>
              </div>
              <div class="desc">
                <h3>Descripción</h3>
                <p>${esc(inc.descripcion || '—')}</p>
              </div>
            </div>
            ${internalBox}
            <div class="action-grid">
              <article class="action-card">
                <h4>Diagnóstico inicial</h4>
                <p>Resumen del estado reportado y condiciones observadas al momento de levantar el incidente.</p>
              </article>
              <article class="action-card">
                <h4>Plan de atención</h4>
                <p>Acciones recomendadas para resolver y prevenir recurrencias, priorizando continuidad operativa.</p>
              </article>
            </div>
            <div class="sign">
              <div><div class="line"></div><div class="lbl">Responsable de atención</div></div>
              <div><div class="line"></div><div class="lbl">Recepción / conformidad</div></div>
            </div>
          </div>
        `;
        document.getElementById('doc-body').innerHTML = html;
        fitSinglePage();
        updateAudienceLabel();
        document.getElementById('msg').textContent = 'Reporte listo en formato optimizado para una sola página A4.';
      }
      function runPrint() { window.print(); }
      document.getElementById('btn-print').addEventListener('click', runPrint);
      document.getElementById('btn-close').addEventListener('click', function () { window.close(); });
      document.getElementById('btn-audience').addEventListener('click', function () {
        audience = audience === 'cliente' ? 'interno' : 'cliente';
        localStorage.setItem('pdf-audience', audience);
        load();
      });
      async function load() {
        try {
          const saved = localStorage.getItem('pdf-audience');
          if (saved === 'interno' || saved === 'cliente') audience = saved;
          const [inc, cfg] = await Promise.all([
            getJson(API + '/incidentes/' + id),
            getJson(API + '/config').catch(() => ({})),
          ]);
          render(inc, cfg || {});
          if (shouldAutoPrint) setTimeout(runPrint, 350);
        } catch (e) {
          document.getElementById('doc-body').innerHTML = '<div class="error">' + esc(e.message || 'No se pudo cargar el incidente.') + '</div>';
          document.getElementById('msg').textContent = 'Error al cargar.';
        }
      }
      load();
    })();
  </script>
</body>
</html>
