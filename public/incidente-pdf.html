<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reporte de incidente</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, 'Georgia', serif;
      margin: 0;
      padding: 0;
      color: #0f172a;
      font-size: 11pt;
      line-height: 1.45;
      background: linear-gradient(165deg, #fff7ed 0%, #ffedd5 45%, #fafafa 100%);
    }
    .no-print { position: fixed; top: 0; left: 0; right: 0; z-index: 9999; padding: 0.75rem 1.5rem; background: linear-gradient(90deg, #7c2d12 0%, #c2410c 45%, #ea580c 100%); color: #fff7ed; display: flex; align-items: center; gap: 1rem; box-shadow: 0 4px 20px rgba(234, 88, 12, 0.35); }
    .no-print button { padding: 0.5rem 1rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
    .no-print #btn-print { background: linear-gradient(135deg, #fb923c 0%, #ea580c 100%); color: #fff; box-shadow: 0 2px 12px rgba(234, 88, 12, 0.4); }
    .no-print #btn-close { background: #475569; color: #fff; }
    .doc { max-width: 210mm; margin: 0 auto; padding: 2rem 2.5rem; padding-top: 4rem; }
    .no-print + .doc { padding-top: 2rem; }
    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      .no-print { display: none !important; }
      .doc { padding-top: 0.5rem; background: #fff; }
      body { background: #fff; }
    }
    .letterhead {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 1rem 1.15rem 1.15rem;
      margin: -0.25rem -0.5rem 1.35rem;
      border-radius: 12px;
      background: linear-gradient(125deg, #9a3412 0%, #c2410c 40%, #ea580c 75%, #f97316 100%);
      color: #fff;
      box-shadow: 0 8px 28px rgba(234, 88, 12, 0.38);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .letterhead-logo { height: 48px; width: auto; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.2)); }
    .letterhead-company .name { font-size: 1.12rem; font-weight: 800; color: #fff; margin: 0; text-shadow: 0 1px 2px rgba(0,0,0,0.15); }
    .letterhead-company .tagline { font-size: 0.76rem; color: rgba(255,255,255,0.9); margin: 0.3rem 0 0; }
    .doc-title {
      text-align: center;
      font-size: 1.42rem;
      font-weight: 800;
      margin: 0 0 1.15rem;
      letter-spacing: 0.08em;
      background: linear-gradient(90deg, #c2410c, #ea580c, #fb923c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
    }
    @supports not (background-clip: text) {
      .doc-title { color: #ea580c; -webkit-text-fill-color: #ea580c; }
    }
    .doc-meta { display: flex; flex-wrap: wrap; gap: 1rem 1.5rem; margin-bottom: 1.15rem; font-size: 0.88rem; }
    .doc-meta span { display: block; padding: 0.4rem 0.7rem; background: linear-gradient(180deg, #fff7ed 0%, #ffedd5 100%); border-radius: 8px; border: 1px solid #fdba74; }
    .doc-meta strong { color: #9a3412; margin-right: 0.3rem; font-weight: 700; }
    .doc-section { margin-bottom: 1.1rem; }
    .doc-section-title { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.14em; color: #c2410c; margin-bottom: 0.4rem; font-weight: 700; }
    .doc-section-content {
      background: linear-gradient(180deg, #fffbeb 0%, #fef3c7 100%);
      padding: 0.95rem 1.05rem;
      border: 1px solid #fcd34d;
      border-radius: 10px;
      border-left: 4px solid #ea580c;
      box-shadow: 0 2px 10px rgba(124, 45, 18, 0.08);
    }
    .doc-section-content p { margin: 0.25rem 0; }
    .doc-table { width: 100%; border-collapse: separate; border-spacing: 0; margin: 0.85rem 0; font-size: 0.9rem; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 14px rgba(124, 45, 18, 0.1); }
    .doc-table th, .doc-table td { padding: 0.5rem 0.65rem; text-align: left; border: 1px solid #fed7aa; }
    .doc-table th {
      background: linear-gradient(180deg, #ea580c 0%, #c2410c 100%);
      color: #fff;
      font-weight: 700;
      width: 32%;
      text-shadow: 0 1px 1px rgba(0,0,0,0.12);
    }
    .doc-table td { background: #fff; }
    .doc-table tr:nth-child(even) td { background: #fff7ed; }
    .badge { display: inline-block; padding: 0.28rem 0.65rem; border-radius: 999px; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.02em; }
    .badge-alta { background: linear-gradient(135deg, #fef08a 0%, #fde047 100%); color: #854d0e; border: 1px solid #eab308; }
    .badge-critica { background: linear-gradient(135deg, #fecaca 0%, #f87171 100%); color: #7f1d1d; border: 1px solid #ef4444; }
    .badge-media { background: linear-gradient(135deg, #bfdbfe 0%, #93c5fd 100%); color: #1e3a8a; border: 1px solid #3b82f6; }
    .badge-baja { background: linear-gradient(135deg, #bbf7d0 0%, #86efac 100%); color: #14532d; border: 1px solid #22c55e; }
    .badge-abierto { background: linear-gradient(135deg, #fde68a 0%, #fcd34d 100%); color: #92400e; border: 1px solid #f59e0b; }
    .badge-cerrado { background: linear-gradient(135deg, #86efac 0%, #4ade80 100%); color: #14532d; border: 1px solid #16a34a; }
    .badge-en_proceso { background: linear-gradient(135deg, #93c5fd 0%, #60a5fa 100%); color: #1e3a8a; border: 1px solid #2563eb; }
    .doc-firma { margin-top: 1.5rem; }
    .doc-firma-line { border-bottom: 2px solid #ea580c; height: 2em; width: 220px; margin-bottom: 0.25rem; }
    .doc-firma-label { font-size: 0.72rem; color: #64748b; font-weight: 600; }
    .loading, .error { padding: 2rem; text-align: center; }
    .error { background: linear-gradient(180deg, #fef2f2 0%, #fee2e2 100%); color: #b91c1c; border: 1px solid #fecaca; border-radius: 10px; }
  </style>
</head>
<body>
  <div class="no-print">
    <span id="msg">Cargando reporte…</span>
    <button type="button" id="btn-print"><strong>Imprimir / Guardar como PDF</strong></button>
    <button type="button" id="btn-close">Cerrar</button>
  </div>
  <div id="doc-body"></div>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const API = window.location.pathname.replace(/\/[^/]*$/, '') + '/api';
      if (!id) {
        document.getElementById('doc-body').innerHTML = '<div class="doc"><div class="error">Falta el ID del incidente (ej. ?id=1).</div></div>';
        document.getElementById('msg').textContent = '';
        return;
      }
      function esc(s) { if (s == null) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
      function fmtDate(s) { if (!s) return '—'; return String(s).slice(0, 10); }
      function prioridadClass(p) { const x = (p || '').toLowerCase(); if (x === 'critica') return 'badge-critica'; if (x === 'alta') return 'badge-alta'; if (x === 'media') return 'badge-media'; return 'badge-baja'; }
      function estatusClass(e) { const x = (e || '').toLowerCase(); if (x === 'cerrado') return 'badge-cerrado'; if (x === 'en_proceso') return 'badge-en_proceso'; return 'badge-abierto'; }
      function render(inc) {
        const basePath = window.location.pathname.replace(/\/[^/]*$/, '') || '';
        const logoUrl = basePath ? (window.location.origin + basePath + '/favicon.svg') : (window.location.origin + '/favicon.svg');
        const prioridad = (inc.prioridad || 'media').toLowerCase();
        const estatus = (inc.estatus || 'abierto').toLowerCase();
        const html = `
          <div class="doc">
            <header class="letterhead">
              <img src="${esc(logoUrl)}" alt="" class="letterhead-logo" aria-hidden="true">
              <div class="letterhead-company">
                <p class="name">Sistema de Cotización y Gestión</p>
                <p class="tagline">Reportes de incidentes · Seguimiento y SLA</p>
              </div>
            </header>
            <h2 class="doc-title">REPORTE DE INCIDENTE</h2>
            <div class="doc-meta">
              <span><strong>Folio:</strong> ${esc(inc.folio)}</span>
              <span><strong>Fecha de reporte:</strong> ${fmtDate(inc.fecha_reporte)}</span>
              <span><strong>Fecha de vencimiento:</strong> ${fmtDate(inc.fecha_vencimiento) || '—'}</span>
              <span><strong>Fecha de cierre:</strong> ${fmtDate(inc.fecha_cerrado) || '—'}</span>
            </div>
            <table class="doc-table">
              <tr><th>Cliente</th><td>${esc(inc.cliente_nombre)}</td></tr>
              <tr><th>Máquina / Equipo</th><td>${esc(inc.maquina_nombre) || '—'}</td></tr>
              <tr><th>Prioridad</th><td><span class="badge ${prioridadClass(inc.prioridad)}">${esc(inc.prioridad || 'media')}</span></td></tr>
              <tr><th>Estatus</th><td><span class="badge ${estatusClass(inc.estatus)}">${esc(inc.estatus || 'abierto')}</span></td></tr>
              <tr><th>Técnico responsable</th><td>${esc(inc.tecnico_responsable) || '—'}</td></tr>
            </table>
            <div class="doc-section">
              <div class="doc-section-title">Descripción del incidente</div>
              <div class="doc-section-content">
                <p>${esc(inc.descripcion || '—').replace(/\n/g, '<br>')}</p>
              </div>
            </div>
            <p class="doc-firma-label" style="margin-top:1.25rem;">Documento generado para seguimiento interno y/o entrega al cliente. Fecha de impresión: ${fmtDate(new Date().toISOString())}</p>
            <div class="doc-firma-line" style="margin-top:1rem;"></div>
            <div class="doc-firma-label">Firma de recepción / conformidad (opcional)</div>
          </div>
        `;
        document.getElementById('doc-body').innerHTML = html;
        document.getElementById('msg').textContent = 'Listo. Use «Imprimir» y elija «Guardar como PDF» para descargar.';
      }
      function runPrint() { window.print(); }
      document.getElementById('btn-print').addEventListener('click', runPrint);
      document.getElementById('btn-close').addEventListener('click', function() { window.close(); });
      async function load() {
        try {
          const res = await fetch(API + '/incidentes/' + id);
          if (!res.ok) throw new Error('Incidente no encontrado');
          const inc = await res.json();
          render(inc);
          setTimeout(runPrint, 350);
        } catch (e) {
          document.getElementById('doc-body').innerHTML = '<div class="doc"><div class="error">' + esc(e.message || 'No se pudo cargar el incidente.') + '</div></div>';
          document.getElementById('msg').textContent = 'Error al cargar.';
        }
      }
      load();
    })();
  </script>
</body>
</html>
