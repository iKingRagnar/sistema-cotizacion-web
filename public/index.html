<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Cargando…</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script>
    (function () {
      try {
        var th = localStorage.getItem('cotizacion-theme');
        if (th === 'light') document.documentElement.classList.add('appearance-light');
      } catch (e) {}
    })();
  </script>
  <script>
    (function () {
      try {
        var h = (location.hostname || '').toLowerCase().replace(/^\[/, '').replace(/\]$/, '');
        var loopback = h === 'localhost' || h === '127.0.0.1' || h === '::1';
        var renderLike = /\.onrender\.com$/i.test(h);
        if (!loopback && !renderLike) return;
        if (!('serviceWorker' in navigator)) return;
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          return Promise.all((regs || []).map(function (r) { return r.unregister(); }));
        }).catch(function () {});
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="/client/styles/app.css?v=scratch-3">
</head>
<body>
  <div id="app-watermark" class="app-watermark" aria-hidden="true"></div>
  <div id="toast-root" class="toast-root" aria-live="polite"></div>
  <div id="modal-root" class="modal-root"></div>
  <div id="app"></div>
  <script type="module" src="/client/js/app.js?v=scratch-3"></script>
</body>
</html>
