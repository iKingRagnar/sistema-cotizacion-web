<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reporte · UNIVERSAL Maquinaria</title>
  <style>
    :root {
      --ink: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --bg: #eef1f5;
      --primary: #1e3a5f;
      --primary-2: #1d4ed8;
      --accent: #FFD200;
      --ok: #16a34a;
      --warn: #d97706;
      --crit: #dc2626;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", "Inter", Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .toolbar {
      position: sticky; top: 0; z-index: 10;
      background: #0f172a; color: #fff;
      padding: 10px 18px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .toolbar .left { display: flex; align-items: center; gap: 10px; }
    .toolbar button {
      background: var(--accent); color: #0f172a;
      border: none; border-radius: 6px;
      padding: 8px 16px; font-weight: 700; cursor: pointer;
      font-size: 13px;
    }
    .toolbar button.secondary {
      background: transparent; color: #fff;
      border: 1px solid #475569;
    }
    .page {
      max-width: 297mm; /* A4 landscape por defecto, tabla cabe mejor */
      margin: 16px auto;
      background: #fff;
      padding: 14mm 14mm 12mm;
      box-shadow: 0 10px 30px rgba(15,23,42,0.10);
      border-radius: 6px;
    }
    /* HEADER UNIVERSAL */
    .uni-header {
      position: relative;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-2) 70%, #0d9488 100%);
      color: #fff;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 18px;
      overflow: hidden;
      box-shadow: 0 8px 22px rgba(15,23,42,0.18);
    }
    .uni-header::before {
      content: '';
      position: absolute;
      top: -50%; right: -10%;
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(255,210,0,0.15), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .uni-header-inner {
      position: relative; z-index: 2;
      display: flex; justify-content: space-between; align-items: center;
      gap: 18px;
    }
    .brand {
      display: flex; align-items: center; gap: 14px;
    }
    .brand-logo {
      width: 56px; height: 56px;
      background: rgba(255,255,255,0.18);
      border: 2px solid rgba(255,210,0,0.7);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 22px;
      color: var(--accent);
      letter-spacing: -1px;
    }
    .brand-title {
      font-size: 22px; font-weight: 800; letter-spacing: 0.5px;
      margin: 0; line-height: 1.1;
    }
    .brand-sub {
      font-size: 12px; opacity: 0.85;
      margin: 3px 0 0;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    .doc-meta {
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 11.5px;
      min-width: 200px;
    }
    .doc-meta .row {
      display: flex; justify-content: space-between; gap: 16px;
      padding: 2px 0;
    }
    .doc-meta .label { color: rgba(255,255,255,0.7); }
    .doc-meta .val { font-weight: 600; }

    /* TÍTULO DEL REPORTE */
    .report-title-bar {
      display: flex; justify-content: space-between; align-items: baseline;
      margin: 8px 0 14px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--accent);
    }
    .report-title-bar h1 {
      margin: 0; font-size: 18px; color: var(--primary);
      letter-spacing: 0.4px; text-transform: uppercase;
    }
    .report-title-bar .count {
      font-size: 12px; color: var(--muted);
      background: #f1f5f9; padding: 4px 10px; border-radius: 999px;
      font-weight: 600;
    }

    /* TABLA */
    .table-wrap { border-radius: 10px; overflow: hidden; border: 1px solid var(--line); }
    table.report-tbl { width: 100%; border-collapse: collapse; font-size: 11.5px; }
    table.report-tbl thead th {
      background: var(--primary); color: #fff;
      padding: 9px 10px; text-align: left;
      font-weight: 600; letter-spacing: 0.2px;
      border-right: 1px solid rgba(255,255,255,0.12);
      white-space: nowrap;
    }
    table.report-tbl thead th:last-child { border-right: none; }
    table.report-tbl tbody td {
      padding: 7px 10px; border-bottom: 1px solid var(--line);
      color: var(--ink); vertical-align: top;
    }
    table.report-tbl tbody tr:nth-child(even) td { background: #fafbfc; }
    table.report-tbl tbody tr:hover td { background: #fef9c3; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .empty-cell { color: #94a3b8; }

    /* RESUMEN INFERIOR */
    .summary {
      margin-top: 14px;
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    }
    .stat {
      border: 1px solid var(--line); border-radius: 8px;
      padding: 10px 12px; background: linear-gradient(135deg, #fff, #f8fafc);
      border-left: 4px solid var(--primary-2);
    }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
    .stat-value { font-size: 18px; font-weight: 700; margin-top: 3px; color: var(--ink); }

    /* FOOTER */
    .footer {
      margin-top: 22px; padding-top: 10px;
      border-top: 1px solid var(--line);
      display: flex; justify-content: space-between;
      font-size: 10px; color: var(--muted);
    }
    .footer .powered { font-style: italic; }
    .footer .badge-stamp {
      display: inline-block; padding: 2px 8px;
      background: var(--accent); color: var(--primary);
      border-radius: 4px; font-weight: 700; font-size: 9px;
      letter-spacing: 0.5px;
    }
    .loading { text-align: center; padding: 60px; color: var(--muted); font-style: italic; }

    @media print {
      body { background: #fff; }
      .toolbar { display: none; }
      .page { box-shadow: none; margin: 0; max-width: none; padding: 8mm 10mm; border-radius: 0; }
      .uni-header { break-inside: avoid; page-break-inside: avoid; }
      table.report-tbl { break-inside: auto; page-break-inside: auto; }
      tr { break-inside: avoid; page-break-inside: avoid; }
      thead { display: table-header-group; }
      .summary { break-inside: avoid; }
    }
    @page { size: A4 landscape; margin: 6mm; }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="left">
      <span><strong id="tb-title">Reporte</strong></span>
      <span style="opacity:0.6; font-size:12px;">· UNIVERSAL Maquinaria</span>
    </div>
    <div>
      <button class="secondary" onclick="window.close()">Cerrar</button>
      <button onclick="window.print()">📄 Imprimir / Guardar PDF</button>
    </div>
  </div>

  <div class="page" id="page">
    <div class="loading" id="loading">Generando reporte…</div>
    <div id="content" style="display:none;">
      <!-- HEADER -->
      <header class="uni-header">
        <div class="uni-header-inner">
          <div class="brand">
            <div class="brand-logo">U</div>
            <div>
              <h2 class="brand-title" id="brand-title">UNIVERSAL Maquinaria</h2>
              <p class="brand-sub" id="brand-sub">Servicio Técnico · Inteligencia Operativa</p>
            </div>
          </div>
          <div class="doc-meta">
            <div class="row"><span class="label">Documento</span><span class="val" id="doc-tipo">Reporte</span></div>
            <div class="row"><span class="label">Generado</span><span class="val" id="doc-fecha">—</span></div>
            <div class="row"><span class="label">Periodo</span><span class="val" id="doc-periodo">—</span></div>
          </div>
        </div>
      </header>

      <!-- TÍTULO -->
      <div class="report-title-bar">
        <h1 id="report-title">Reporte</h1>
        <span class="count" id="report-count">0 registros</span>
      </div>

      <!-- TABLA -->
      <div class="table-wrap">
        <table class="report-tbl">
          <thead><tr id="thead-row"></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <!-- RESUMEN (opcional, según tipo de reporte) -->
      <div class="summary" id="summary"></div>

      <!-- FOOTER -->
      <footer class="footer">
        <div>
          <span class="badge-stamp">UNIVERSAL</span>
          Sistema de Servicio Técnico
        </div>
        <div class="powered">powered by Ing. David Cantú</div>
      </footer>
    </div>
  </div>

  <script>
    (function () {
      try {
        // Datos vía sessionStorage (más confiable que postMessage entre tabs)
        const key = new URLSearchParams(location.search).get('key') || 'report-data';
        const raw = sessionStorage.getItem(key);
        if (!raw) {
          document.getElementById('loading').innerHTML = '<p style="color:#dc2626;">No se recibieron datos del reporte.<br><small>Vuelve a la pestaña principal y haz clic en el botón de reporte.</small></p>';
          return;
        }
        const cfg = JSON.parse(raw);
        const title = cfg.title || 'Reporte';
        const headers = cfg.headers || [];
        const rows = cfg.rows || [];
        const periodo = cfg.periodo || new Date().toLocaleString('es-MX', { month: 'long', year: 'numeric' });
        const docTipo = cfg.docTipo || 'Reporte tabular';
        const summary = cfg.summary || [];
        const colTypes = cfg.colTypes || []; // ['text','num','badge','date',...]

        // Branding
        if (cfg.brand) {
          if (cfg.brand.title) document.getElementById('brand-title').textContent = cfg.brand.title;
          if (cfg.brand.sub) document.getElementById('brand-sub').textContent = cfg.brand.sub;
          if (cfg.brand.logoText) document.querySelector('.brand-logo').textContent = cfg.brand.logoText;
        }

        document.title = title + ' · UNIVERSAL';
        document.getElementById('tb-title').textContent = title;
        document.getElementById('report-title').textContent = title;
        document.getElementById('doc-tipo').textContent = docTipo;
        document.getElementById('doc-fecha').textContent = new Date().toLocaleString('es-MX');
        document.getElementById('doc-periodo').textContent = periodo.charAt(0).toUpperCase() + periodo.slice(1);
        document.getElementById('report-count').textContent = rows.length + ' registro' + (rows.length === 1 ? '' : 's');

        // Headers
        const trHead = document.getElementById('thead-row');
        trHead.innerHTML = headers.map((h, i) => {
          const t = colTypes[i] || 'text';
          return `<th class="${t === 'num' ? 'num' : ''}">${escapeHtml(h)}</th>`;
        }).join('');

        // Filas
        const tbody = document.getElementById('tbody');
        if (!rows.length) {
          tbody.innerHTML = `<tr><td colspan="${headers.length || 1}" style="text-align:center;color:#94a3b8;padding:24px;font-style:italic;">No hay registros para mostrar</td></tr>`;
        } else {
          tbody.innerHTML = rows.map(r => {
            const cells = r.map((v, i) => {
              const t = colTypes[i] || 'text';
              if (v == null || v === '') return '<td><span class="empty-cell">—</span></td>';
              if (t === 'num') return `<td class="num">${escapeHtml(String(v))}</td>`;
              return `<td>${escapeHtml(String(v))}</td>`;
            }).join('');
            return `<tr>${cells}</tr>`;
          }).join('');
        }

        // Summary
        if (summary && summary.length) {
          document.getElementById('summary').innerHTML = summary.map(s =>
            `<div class="stat"><div class="stat-label">${escapeHtml(s.label)}</div><div class="stat-value">${escapeHtml(String(s.value))}</div></div>`
          ).join('');
        } else {
          document.getElementById('summary').style.display = 'none';
        }

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';

        // Auto-print
        if (cfg.autoprint) setTimeout(() => window.print(), 500);
      } catch (e) {
        document.getElementById('loading').innerHTML = '<p style="color:#dc2626;">Error al generar reporte: ' + (e.message || e) + '</p>';
        console.error('[table-report]', e);
      }
      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
      }
    })();
  </script>
</body>
</html>
