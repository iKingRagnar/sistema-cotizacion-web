# Web Node (Express + public estático). NO es Next: el build solo valida server.js.
# En el panel Render: Build = npm ci && npm run build (o deja el default si coincide).
# Variables: TURSO_DATABASE_URL y TURSO_AUTH_TOKEN.
services:
  - type: web
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
