# ════════════════════════════════════════════════════════════════
# Render config — apunta a la app PRINCIPAL en la RAÍZ del repo.
# (Antes apuntaba por error a /v3, una versión vieja/mínima. La app real
#  con cotizaciones, agenda, refacciones, etc. vive en la raíz.)
# Render auto-detecta este archivo y aplica los settings sin tocar UI.
# ════════════════════════════════════════════════════════════════
services:
  - type: web
    name: sistema-cotizacion-web
    runtime: node
    plan: free
    region: oregon
    # Build: instala deps de la RAÍZ
    buildCommand: npm ci --omit=dev
    # Start: arranca el server de la RAÍZ (auto-crea DB + migraciones + seed admin)
    startCommand: node server.js
    healthCheckPath: /health
    # Auto-deploy en cada push a main
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      # IMPORTANTE: sync:false -> se gestiona en el panel de Render y NO se regenera
      # ni sobrescribe en cada deploy. Así NO se cierran las sesiones existentes ni se
      # repone la contraseña admin si Render re-aplica este Blueprint.
      - key: JWT_SECRET
        sync: false
      # Puerto que Render asigna
      - key: PORT
        value: 10000
      # Credenciales admin: se gestionan en el panel; no se sobrescriben aquí.
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      # Para DavAI — configúralo en el panel cuando tengas key
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
